<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPP CE752 — Q&A Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f5f5f4;
  --bg-tertiary:#ece9e3;
  --text-primary:#1a1a1a;
  --text-secondary:#6b6b6b;
  --text-tertiary:#9b9b9b;
  --border:#e0ddd6;
  --border-hover:#b0ada6;
  --success-bg:#e8f5e9;
  --success-text:#1b5e20;
  --success-border:#4caf50;
  --danger-bg:#ffebee;
  --danger-text:#b71c1c;
  --danger-border:#ef5350;
  --info-bg:#e3f2fd;
  --info-text:#0d47a1;
  --radius-md:8px;
  --radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1c1c1e;
    --bg-secondary:#2c2c2e;
    --bg-tertiary:#3a3a3c;
    --text-primary:#f2f2f7;
    --text-secondary:#aeaeb2;
    --text-tertiary:#6e6e73;
    --border:#3a3a3c;
    --border-hover:#6e6e73;
    --success-bg:#1b2e1c;
    --success-text:#81c784;
    --danger-bg:#2e1b1b;
    --danger-text:#ef9a9a;
    --info-bg:#1b2a3e;
    --info-text:#90caf9;
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg-tertiary);
  color:var(--text-primary);
  min-height:100vh;
  padding:1.5rem 1rem 4rem;
}
.app{max-width:780px;margin:0 auto}

/* header */
.header{margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px;margin-bottom:4px}
.header p{font-size:13px;color:var(--text-secondary)}

/* chapter tabs */
.chapter-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.ch-btn{
  font-size:12px;font-weight:500;padding:5px 11px;
  border-radius:999px;border:1px solid var(--border);
  background:var(--bg-primary);color:var(--text-secondary);
  cursor:pointer;transition:all 0.15s;font-family:inherit;
}
.ch-btn.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.ch-btn:hover:not(.active){border-color:var(--border-hover);color:var(--text-primary)}

/* controls row */
.controls-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.ctrl-btn{
  font-size:12px;padding:5px 11px;border-radius:999px;
  border:1px solid var(--border);background:var(--bg-primary);
  color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.ctrl-btn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.ctrl-btn.active-filter{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
.spacer{flex:1}

/* stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{
  background:var(--bg-primary);border-radius:var(--radius-md);
  padding:0.65rem 0.75rem;text-align:center;
  border:1px solid var(--border);
}
.stat-n{font-size:20px;font-weight:600;line-height:1.2}
.stat-l{font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
.stat-n.green{color:var(--success-text)}
.stat-n.red{color:var(--danger-text)}
.stat-n.blue{color:var(--info-text)}

/* progress */
.progress{height:3px;background:var(--bg-secondary);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:var(--text-primary);border-radius:2px;transition:width 0.3s ease}

/* card */
.card{
  background:var(--bg-primary);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:1.5rem;
  margin-bottom:1rem;transition:box-shadow 0.2s;
}
.q-meta{display:flex;gap:6px;margin-bottom:0.6rem;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:999px}
.badge-ch{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)}
.badge-certain{background:#ffebee;color:#b71c1c}
.badge-veryhigh{background:#fff3e0;color:#e65100}
.badge-high{background:#e3f2fd;color:#1565c0}
.badge-medium{background:#e0f2f1;color:#004d40}
.q-num{font-size:12px;color:var(--text-tertiary);margin-left:auto;font-variant-numeric:tabular-nums}
.years-tag{font-size:11px;color:var(--text-tertiary);margin-bottom:0.85rem}
.q-text{font-size:15px;font-weight:500;line-height:1.65;color:var(--text-primary);margin-bottom:1.25rem}

/* reveal */
.reveal-btn{
  width:100%;padding:11px;border-radius:var(--radius-md);
  border:1px solid var(--border);background:var(--bg-secondary);
  color:var(--text-primary);font-size:14px;cursor:pointer;
  font-family:inherit;font-weight:500;transition:all 0.15s;
}
.reveal-btn:hover{background:var(--bg-tertiary);border-color:var(--border-hover)}

/* answer */
.answer-box{
  background:var(--bg-secondary);
  border-left:3px solid var(--success-border);
  border-radius:0 var(--radius-md) var(--radius-md) 0;
  padding:1rem 1.25rem;margin-top:1rem;
  animation:slideIn 0.18s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.a-label{font-size:10px;font-weight:600;color:var(--success-text);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.a-text{font-size:14px;line-height:1.75;color:var(--text-primary)}
.mark-row{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.mark-btn{
  padding:7px 14px;border-radius:var(--radius-md);font-size:13px;
  cursor:pointer;font-family:inherit;font-weight:500;border:1px solid;transition:all 0.15s;
}
.mark-correct{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border)}
.mark-wrong{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
.mark-btn:hover{filter:brightness(0.95)}

/* nav */
.nav-row{display:flex;gap:8px;align-items:center;justify-content:space-between}
.nav-btn{
  padding:9px 18px;border-radius:var(--radius-md);border:1px solid var(--border);
  background:var(--bg-primary);color:var(--text-primary);font-size:14px;
  cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s;
}
.nav-btn:hover:not(:disabled){background:var(--bg-secondary)}
.nav-btn:disabled{opacity:0.3;cursor:default}
.nav-btn.primary{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.nav-btn.primary:hover:not(:disabled){opacity:0.85}
.nav-label{font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums}

/* empty */
.empty{text-align:center;padding:4rem 2rem;color:var(--text-secondary);font-size:14px}

/* done banner */
.done-banner{
  text-align:center;padding:2rem;background:var(--bg-primary);
  border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;
}
.done-banner h2{font-size:18px;font-weight:600;margin-bottom:8px}
.done-banner p{font-size:14px;color:var(--text-secondary);margin-bottom:1rem}
.done-score{font-size:40px;font-weight:700;color:var(--success-text)}

@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  body{padding:1rem 0.75rem 3rem}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>EPP CE752 — Q&amp;A Practice</h1>
    <p>Think of your answer, reveal it, mark yourself. Tracks your score per session.</p>
  </div>

  <div class="chapter-strip" id="chBtns"></div>

  <div class="controls-row">
    <button class="ctrl-btn" onclick="shuffle()">⇄ Shuffle</button>
    <button class="ctrl-btn" onclick="resetSession()">↺ Reset score</button>
    <button class="ctrl-btn" id="wrongOnlyBtn" onclick="toggleWrongOnly()">Show wrong only</button>
    <span class="spacer"></span>
    <span style="font-size:12px;color:var(--text-tertiary)" id="filterLabel"></span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n blue" id="sTotal">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n green" id="sCorrect">0</div><div class="stat-l">Correct</div></div>
    <div class="stat"><div class="stat-n red" id="sWrong">0</div><div class="stat-l">Wrong</div></div>
    <div class="stat"><div class="stat-n" id="sPct">—</div><div class="stat-l">Score</div></div>
  </div>

  <div class="progress"><div class="progress-fill" id="pgBar" style="width:0%"></div></div>

  <div id="cardArea"></div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">← Prev</button>
    <span class="nav-label" id="navLabel"></span>
    <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const CHAPTERS = [
  {id:'all',  label:'All chapters'},
  {id:'ch1',  label:'Ch.1 — Society & History'},
  {id:'ch2',  label:'Ch.2 — Ethics & Profession'},
  {id:'ch3',  label:'Ch.3 — Practice Nepal'},
  {id:'ch4',  label:'Ch.4 — Contract'},
  {id:'ch5',  label:'Ch.5 — Regulatory'},
  {id:'ch6',  label:'Ch.6 — Contemporary'},
  {id:'ch7',  label:'Ch.7 — Case Studies'},
];

const ALL_QS = [
  // ── CH1 Society & History ──────────────────────────────────────
  {ch:'ch1',prob:'VERY HIGH',years:'14/19 papers',
   q:'Define the term "society." What is the Latin origin of the word and who said "Man is a social animal"?',
   a:'Society is a group of people who share a common territory, common rules and government, and common culture, values, and beliefs, cooperating for mutual survival and development. The word comes from the Latin "socius" meaning companion or associate. Aristotle said: "Man is a social animal."'},

  {ch:'ch1',prob:'VERY HIGH',years:'14/19 papers',
   q:'List the 9 elements of society.',
   a:'(1) Plurality — male/female/young/old. (2) Differences — opinion/gender/interest. (3) Dynamic — constantly changing. (4) Interdependence — like mother and baby. (5) Cooperation — family, friendship. (6) Likeness — blood/nationality. (7) Mutual understanding and interaction. (8) Social control and stability. (9) Culture — traditions, activities, values. Memory trick: P-D-D-I-C-L-M-S-C.'},

  {ch:'ch1',prob:'VERY HIGH',years:'14/19 papers',
   q:'What are the 5 basic social institutions found in all societies? (memory trick)',
   a:'Family — new members, socialization. Religion — motivation, compliance. Economy — production and distribution. Education — transmit skills. State — protection, laws, enforcement. Memory: FREED.'},

  {ch:'ch1',prob:'VERY HIGH',years:'14/19 papers',
   q:'What are the 6 fundamental social needs identified by Talcott Parsons?',
   a:'(1) Organizing — obtain basic goods (food, shelter, water). (2) Protection — from external and internal threats. (3) Replacement — of members lost by death or emigration. (4) Transmission — of knowledge and responsibilities to new members. (5) Motivation — members to fulfill responsibilities. (6) Development — of mechanisms to solve conflicts. Memory: O-P-R-T-M-D.'},

  {ch:'ch1',prob:'VERY HIGH',years:'12/19 papers',
   q:'Define social change. Who defined it as "change in human relationships"?',
   a:'Social change is the alteration in patterns of culture, social structure, and social behavior over time. It is a dynamic and ongoing process. MacIver defined it as "change in human relationships." M.P. Jenson called it "modification in ways of doing and thinking of people."'},

  {ch:'ch1',prob:'VERY HIGH',years:'12/19 papers',
   q:'List the 6 factors that cause social change. (memory trick)',
   a:'(1) Cultural innovation — discovery and diffusion of ideas. (2) Technology — computers, mobile phones, automobiles. (3) Geography — mountains, deserts, oceans shape society. (4) Environment — earthquakes, floods, climate change force adaptation. (5) Population — significant increase or decrease disrupts social life. (6) Human actions — ideas, movements, revolutions, wars. Memory: CT-GEPHA.'},

  {ch:'ch1',prob:'HIGH',years:'9/19 papers',
   q:'Name the 5 types of societies in historical order and their defining characteristic.',
   a:'(1) Tribal — hunting and gathering, no permanent settlement, family the only institution. (2) Pastoral — domestication of animals, mountainous regions, family + religion appear. (3) Horticultural — cultivation of plants with hoes, slash and burn. (4) Agricultural — plow invented, first cities, money used, all institutions developed. (5) Industrial — machines, factory production, England first, trade unions, 280 years ago.'},

  {ch:'ch1',prob:'HIGH',years:'9/19 papers',
   q:'Which type of society first developed cities and used money? What key technology defined it?',
   a:'Agricultural/Agrarian society (6,000 years ago). The plow was the defining technology — it maintained soil fertility, enabling permanent settlements. First cities developed. Money became the medium of exchange. All social institutions (family, religion, economy, politics, education, art) developed fully.'},

  {ch:'ch1',prob:'HIGH',years:'10/19 papers',
   q:'List 4 positive impacts and 4 negative impacts of technology on society.',
   a:'Positive: (1) Rise of leisure class. (2) Quick global networking and communication. (3) Cheaper prices through mass production. (4) Better healthcare and medical diagnosis. Negative: (1) Pollution and environmental degradation. (2) Loss of privacy — data collection and surveillance. (3) Social separation — reduced personal interaction. (4) Computer crime — hacking, fraud, unauthorized access.'},

  {ch:'ch1',prob:'MEDIUM',years:'7/19 papers',
   q:'What did Chang Heng invent, when, and where?',
   a:'Chang Heng, a Chinese philosopher, invented the Seismoscope in 132 AD in China — the world\'s first earthquake detection device.'},

  {ch:'ch1',prob:'MEDIUM',years:'7/19 papers',
   q:'What did Simon Stevin discover and why is it important to structural engineering?',
   a:'Simon Stevin (Netherlands, 1548–1620) discovered the triangle of forces — the fundamental principle for calculating loads in trusses, cranes, bridges, and other structures. This is a cornerstone of structural engineering analysis.'},

  {ch:'ch1',prob:'MEDIUM',years:'7/19 papers',
   q:'When did the first engineering school appear and where?',
   a:'The first engineering school appeared in France in 1800 AD, formalizing and institutionalizing engineering as a profession with structured education.'},

  {ch:'ch1',prob:'MEDIUM',years:'7/19 papers',
   q:'What is the significance of Mesopotamia/Sumer in engineering history?',
   a:'Towns and cities first appeared in Sumer (Southern Mesopotamia, modern Iraq) between 3500–3000 BC. This is one of the earliest examples of urban planning and engineering in history — grid streets, drainage systems, and monumental construction.'},

  // ── CH2 Ethics & Profession ───────────────────────────────────
  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'List the 5 characteristics of a profession.',
   a:'(1) Systematic knowledge and skill — requires years of specialized education and training. (2) Authenticity and honor — society grants professionals special trust and respect. (3) Public property and evaluation — professional conduct is publicly scrutinized. (4) Bound by code of ethics — regulated by professional bodies like NEC. (5) Professional culture — shared behaviors, norms, and values within the profession.'},

  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'When was NEC established, under which Act, and who was its first chairman?',
   a:'Nepal Engineering Council (NEC) was established on 2055/11/27 BS — March 11, 1999 AD — under Nepal Engineering Council Act 2055. The first Executive Council was formed in Magh 2056 under Chairman Er. Ram Babu Sharma, and completed its tenure in Magh 2060.'},

  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'What are the 3 NEC registration categories?',
   a:'Category A — General Registered Engineer (fresh graduates). Category B — Professional Engineer (experienced, senior). Category C — Non-Nepali (Foreign) Registered Engineer.'},

  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'List all 8 points of the NEC Professional Code of Conduct.',
   a:'(1) Discipline and honesty. (2) Politeness and secrecy — keep client information confidential. (3) Non-discrimination — no discrimination on religion, race, sex, or caste. (4) Do only concerned professional work — work within area of expertise only. (5) Not do work harmful to profession — no bribery or improper financial benefit. (6) Personal responsibility — accountable for all professional work. (7) State name, designation, and registration number on all documents. (8) No misleading advertisement.'},

  {ch:'ch2',prob:'VERY HIGH',years:'13/19 papers',
   q:'When was NEA established? Where is it located? What international body is it a member of?',
   a:'Nepal Engineers\' Association (NEA) was established in 1968 AD (2025 BS). It is located at Pulchowk, Kathmandu. It is an independent, non-profit organization governed by a 15-member executive council with 17 committees. It represents 7500+ engineers and is a member of WFEO (World Federation of Engineering Organizations) and helped establish FEISCA.'},

  {ch:'ch2',prob:'VERY HIGH',years:'13/19 papers',
   q:'Give 5 key differences between NEC and NEA.',
   a:'(1) NEC is a statutory government body; NEA is a non-profit voluntary organization. (2) NEC established 1999 AD; NEA established 1968 AD. (3) NEC regulates and registers engineers; NEA represents and lobbies for engineers. (4) NEC registration is mandatory to practice engineering; NEA membership is voluntary. (5) NEC has legal power to de-register engineers; NEA has no such power.'},

  {ch:'ch2',prob:'VERY HIGH',years:'13/19 papers',
   q:'List the 5 objectives of NEA.',
   a:'(1) Facilitate proper development and mobilization of engineering science and technology in Nepal. (2) Promote mutual cooperation, interaction, and goodwill among Nepalese engineers. (3) Ensure maximum participation of Nepalese engineers in national development. (4) Enhance the highest professional ideals continuously among members. (5) Establish cooperation and goodwill with international engineering institutions.'},

  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'Define Ethics. What are the 6 core ethical values?',
   a:'Ethics is the science of morality — the systematic study of right and wrong conduct. Professional ethics concerns moral issues arising from specialist knowledge and governs how this knowledge should be used when serving the public. Core ethical values: Honesty, Integrity, Fidelity, Charity, Responsibility, Self-Discipline.'},

  {ch:'ch2',prob:'CERTAIN',years:'19/19 papers',
   q:'List the 6 NSPE Fundamental Canons that engineers must follow.',
   a:'(1) Hold paramount the safety, health, and welfare of the public above all other considerations. (2) Perform services only in areas of their competence. (3) Issue public statements only in an objective and truthful manner. (4) Act as faithful agents or trustees for each employer and client. (5) Avoid deceptive acts — no fraud or misrepresentation. (6) Conduct themselves honorably, responsibly, ethically, and lawfully.'},

  {ch:'ch2',prob:'VERY HIGH',years:'11/19 papers',
   q:'Define moral dilemma. Give a real engineering example of one.',
   a:'A moral dilemma is a painful situation where every possible solution involves some kind of loss or harm. The decision must be on the morally correct course, not the personally preferred one. Engineering example: An engineer discovers a hazardous chemical leak. Reporting it is right but the boss threatens job loss. If the engineer stays silent, public safety is harmed. Either choice costs something — this is a moral dilemma.'},

  {ch:'ch2',prob:'VERY HIGH',years:'11/19 papers',
   q:'Name the 5 laws of ethics used to overcome a moral dilemma. (memory trick)',
   a:'(1) Eternal — universal moral standards from nature and scriptures; some things are always right or wrong. (2) Utilitarianism — choose the action providing the greatest benefit for the greatest number of people. (3) Universalism — act as you would want everyone in the same situation to act. (4) Distributive Justice — decisions must be based on fairness; everyone deserves equal rights. (5) Personal Liberty — respect individual freedom and rights. Memory: EU-UDP.'},

  {ch:'ch2',prob:'CERTAIN',years:'17/19 papers',
   q:'Define negligence. What are its 3 essential elements? (ALL 3 must be proven)',
   a:'Negligence is the failure to meet the expected standard of care — acting in a way the law considers unreasonable or careless. The 3 elements that must ALL be proven: (1) Duty of care — defendant had a legal obligation to act in a certain way. (2) Breach of that duty — failed to fulfill this obligation. (3) Resulting damage — the injury or loss was directly caused by the breach. If all 3 are proven, compensation is awarded.'},

  {ch:'ch2',prob:'CERTAIN',years:'17/19 papers',
   q:'Define Tort. What are the grounds for bringing a tort case? What are the objectives of tort law?',
   a:'A tort is an action or inaction that causes loss or damage to another person — a civil wrong independent of any contract. Grounds: Negligence, Intentional wrong, Strict liability. Objectives: (1) Compensate the victim. (2) Transfer cost of injury to the responsible party. (3) Prevent repetition of harmful actions. (4) Defend the legal rights of the victim.'},

  {ch:'ch2',prob:'CERTAIN',years:'17/19 papers',
   q:'Define Liability. What are the 3 types of liability an engineer can face?',
   a:'Liability is the legal obligation to pay a penalty for failing to fulfill predefined professional duties. It is the direct consequence of negligence. Three types: (1) Under contract — works not meeting the specification. (2) In tort — causing injury to others through negligent or reckless action. (3) Under statute — as defined by the laws and acts of Nepal.'},

  {ch:'ch2',prob:'CERTAIN',years:'17/19 papers',
   q:'Define vicarious liability. When does it apply? Give an engineering example.',
   a:'Vicarious liability means an employer is legally liable for a tort committed by their employee during the course of employment, even if the employer did not personally commit the wrongdoing. Also applies to partners in a firm — all partners are liable for any partner\'s tort in the ordinary course of business. Engineering example: If a site engineer negligently designs a structure that collapses, both the engineer AND the consulting firm that employed them are liable.'},

  {ch:'ch2',prob:'VERY HIGH',years:'12/19 papers',
   q:'Why is ethics necessary in engineering profession? Give 5 reasons.',
   a:'(1) Public safety — engineering decisions directly affect public safety; unethical decisions can cause deaths. (2) Public trust — society trusts engineers with designs they cannot independently evaluate. (3) Accountability — ethics makes engineers personally responsible for their decisions. (4) Professionalism — ethics is what distinguishes a profession from mere technical work. (5) Legal compliance — many ethical standards are codified in law; violations lead to liability and de-registration.'},

  // ── CH3 Professional Practice Nepal ───────────────────────────
  {ch:'ch3',prob:'CERTAIN',years:'16/19 papers',
   q:'List the 5 main duties of a fresh engineer in the public sector (PSC 3rd Class Gazette Officer).',
   a:'(1) Preliminary and detailed survey, prefeasibility, feasibility, detail design, and cost estimates. (2) Execution of project works on site — ensuring work follows design and specifications. (3) Report writing — pre-activity, interim progress, monitoring and evaluation, post-implementation reports. (4) Facilitate donor agencies involved in the project. (5) Execute tasks assigned by immediate superiors and assist senior engineers.'},

  {ch:'ch3',prob:'CERTAIN',years:'16/19 papers',
   q:'What is the job description of a fresh engineer in the private sector?',
   a:'(1) Prepare designs, drawings, specifications, and cost estimates for client projects. (2) Supervise construction to ensure quality matches design specifications. (3) Maintain client communication, understand requirements, and report progress. (4) Prepare technical reports, proposals, and documentation. (5) Assist in preparing EOIs and RFPs to win new contracts for the firm.'},

  {ch:'ch3',prob:'CERTAIN',years:'16/19 papers',
   q:'Give 4 differences between public sector and private sector engineering work in Nepal.',
   a:'(1) Budget: public = government funds; private = client revenue and project contracts. (2) Job security: public = high security, seniority-based promotion; private = performance-based, faster growth. (3) Appointment: public = through PSC examination; private = direct company hiring. (4) Focus: public = compliance, reporting, donor facilitation; private = client satisfaction, profit, and meeting deadlines.'},

  {ch:'ch3',prob:'CERTAIN',years:'16/19 papers',
   q:'Name 5 types of organizations where engineers work in the public sector in Nepal.',
   a:'(1) Government ministries and departments (e.g., DoR, DWSS). (2) Regional and district offices. (3) Constitutional bodies — parliament, courts, CIAA. (4) Municipalities and local governments (DDC, VDC, Metropolitan cities). (5) Public universities and engineering institutions (e.g., IOE, Pulchowk).'},

  // ── CH4 Contract ──────────────────────────────────────────────
  {ch:'ch4',prob:'CERTAIN',years:'16/19 papers',
   q:'Define Contract. How is it different from a simple agreement?',
   a:'A contract is a legally enforceable agreement between two or more parties that creates mutual legal obligations. If one party breaches it, the other can seek legal remedy in court. An agreement is simply a mutual understanding — it may not be legally enforceable. Every contract is an agreement, but not every agreement is a contract. A contract requires all 6 essential elements to be present.'},

  {ch:'ch4',prob:'CERTAIN',years:'16/19 papers',
   q:'List all 6 essential elements of a valid contract.',
   a:'(1) Offer — one party makes a clear, definite proposal with specific terms. (2) Acceptance — unconditional agreement to the offer, communicated to the offeror. (3) Consideration — something of value exchanged by both parties (money, services, goods). (4) Legal capacity — both parties must be 18+, of sound mind, and not legally disqualified. (5) Legal object — the purpose of the contract must be lawful. (6) Free consent — agreement must be voluntary, without coercion, fraud, undue influence, or mistake.'},

  {ch:'ch4',prob:'CERTAIN',years:'16/19 papers',
   q:'Differentiate void and voidable contract. Give an example of each.',

let activeChapter = 'all';
let showWrongOnly = false;
let questions = [...ALL_QS];
let idx = 0;
let revealed = false;
let correct = 0;
let wrong = 0;
let answered = new Set();
let wrongIds = new Set();

function filtered() {
  let qs = activeChapter === 'all' ? [...ALL_QS] : ALL_QS.filter(q => q.ch === activeChapter);
  if (showWrongOnly) qs = qs.filter((q, i) => wrongIds.has(getOriginalIndex(q)));
  return qs;
}

function getOriginalIndex(q) {
  return ALL_QS.indexOf(q);
}

function setChapter(id) {
  activeChapter = id;
  showWrongOnly = false;
  questions = filtered();
  idx = 0; revealed = false; correct = 0; wrong = 0; answered = new Set(); wrongIds = new Set();
  renderChBtns();
  renderCard();
  updateStats();
  updateFilterLabel();
}

function shuffle() {
  questions = filtered().sort(() => Math.random() - 0.5);
  idx = 0; revealed = false;
  renderCard();
}

function resetSession() {
  correct = 0; wrong = 0; answered = new Set(); wrongIds = new Set();
  showWrongOnly = false;
  questions = filtered();
  idx = 0; revealed = false;
  renderCard();
  updateStats();
  updateFilterLabel();
}

function toggleWrongOnly() {
  if (wrong === 0 && !showWrongOnly) return;
  showWrongOnly = !showWrongOnly;
  questions = filtered();
  idx = 0; revealed = false;
  renderCard();
  updateFilterLabel();
  const btn = document.getElementById('wrongOnlyBtn');
  btn.classList.toggle('active-filter', showWrongOnly);
}

function go(dir) {
  idx = Math.max(0, Math.min(questions.length - 1, idx + dir));
  revealed = false;
  renderCard();
}

function reveal() {
  revealed = true;
  renderCard();
}

function mark(isCorrect) {
  const q = questions[idx];
  const origIdx = getOriginalIndex(q);
  if (answered.has(origIdx)) {
    if (idx < questions.length - 1) setTimeout(() => go(1), 200);
    return;
  }
  answered.add(origIdx);
  if (isCorrect) { correct++; wrongIds.delete(origIdx); }
  else { wrong++; wrongIds.add(origIdx); }
  updateStats();
  if (idx < questions.length - 1) setTimeout(() => go(1), 300);
  else renderCard();
}

function probClass(p) {
  const map = {'CERTAIN':'badge-certain','VERY HIGH':'badge-veryhigh','HIGH':'badge-high','MEDIUM':'badge-medium'};
  return map[p] || 'badge-medium';
}

function chLabel(id) {
  const c = CHAPTERS.find(c => c.id === id);
  return c ? c.label.replace('Ch.','').split('—')[1]?.trim() || c.label : id;
}

function renderChBtns() {
  document.getElementById('chBtns').innerHTML = CHAPTERS.map(c =>
    `<button class="ch-btn${activeChapter===c.id?' active':''}" onclick="setChapter('${c.id}')">${c.label}</button>`
  ).join('');
}

function updateFilterLabel() {
  const lbl = document.getElementById('filterLabel');
  lbl.textContent = showWrongOnly ? `Showing ${questions.length} wrong answers` : `${questions.length} questions`;
}

function renderCard() {
  const area = document.getElementById('cardArea');
  if (!questions.length) {
    area.innerHTML = showWrongOnly
      ? '<div class="empty">No wrong answers to review. Well done!</div>'
      : '<div class="empty">No questions for this selection.</div>';
    document.getElementById('navLabel').textContent = '';
    document.getElementById('pgBar').style.width = '0%';
    return;
  }
  const q = questions[idx];
  const origIdx = getOriginalIndex(q);
  const alreadyAnswered = answered.has(origIdx);
  const pct = Math.round((idx + 1) / questions.length * 100);
  document.getElementById('pgBar').style.width = pct + '%';
  document.getElementById('navLabel').textContent = `${idx + 1} / ${questions.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === questions.length - 1;

  const answerHTML = revealed ? `
    <div class="answer-box">
      <div class="a-label">Answer</div>
      <div class="a-text">${q.a.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="mark-row">
      <button class="mark-btn mark-wrong" onclick="mark(false)">✗ Got it wrong</button>
      <button class="mark-btn mark-correct" onclick="mark(true)">✓ Got it right</button>
    </div>
  ` : `<button class="reveal-btn" onclick="reveal()">Show Answer ↓</button>`;

  area.innerHTML = `
    <div class="card">
      <div class="q-meta">
        <span class="badge badge-ch">${CHAPTERS.find(c=>c.id===q.ch)?.label||q.ch}</span>
        <span class="badge ${probClass(q.prob)}">${q.prob}</span>
        <span class="q-num">#${idx + 1}</span>
      </div>
      <div class="years-tag">Asked in ${q.years}</div>
      <div class="q-text">${q.q}</div>
      ${answerHTML}
    </div>
  `;
}

function updateStats() {
  const done = answered.size;
  const pct = done > 0 ? Math.round(correct / done * 100) : null;
  document.getElementById('sTotal').textContent = questions.length;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sPct').textContent = pct !== null ? pct + '%' : '—';
  updateFilterLabel();
}

renderChBtns();
renderCard();
updateStats();
updateFilterLabel();
</script>
