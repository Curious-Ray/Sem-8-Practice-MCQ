// ---------- State ----------
const state = {
  chapterId: 1,
  questionIdx: 0,
  pointIdx: 0,
  view: 'practice',
  retryMode: false,
  retryList: [],
  retryIdx: 0,
  answers: {},
  correctCount: 0,
  flagged: new Set()
};

function loadFlagged() {
  try {
    const saved = JSON.parse(localStorage.getItem('mm_flagged') || '[]');
    state.flagged = new Set(saved);
  } catch (_) { state.flagged = new Set(); }
}
function saveFlagged() {
  try { localStorage.setItem('mm_flagged', JSON.stringify([...state.flagged])); } catch (_) {}
}
function toggleFlag(key) {
  if (state.flagged.has(key)) state.flagged.delete(key);
  else state.flagged.add(key);
  saveFlagged();
  updateFlaggedFloat();
}

function retryQuestion(key) {
  const ans = state.answers[key];
  if (ans && ans.correct === true) state.correctCount--;
  delete state.answers[key];
  render();
}

function findPointByKey(key) {
  const m = key.match(/^c(\d+)\.q(\d+)\.p(\d+)$/);
  if (!m) return null;
  const chId = parseInt(m[1], 10);
  const qIdx = parseInt(m[2], 10);
  const pIdx = parseInt(m[3], 10);
  const chapter = DATA.chapters.find(c => c.id === chId);
  if (!chapter || !chapter.questions) return null;
  const question = chapter.questions[qIdx];
  if (!question) return null;
  const pts = flatPoints(question);
  const pt = pts[pIdx];
  if (!pt) return null;
  return {
    chapterId: chId,
    chapterTitle: chapter.title,
    questionId: question.id,
    sectionTitle: pt._sectionTitle,
    question: pt.q,
    key
  };
}

function buildFlaggedCopyText() {
  const items = [...state.flagged].map(findPointByKey).filter(Boolean);
  if (items.length === 0) return '(no flagged questions)';
  const byCh = {};
  items.forEach(it => {
    if (!byCh[it.chapterId]) byCh[it.chapterId] = { title: it.chapterTitle, items: [] };
    byCh[it.chapterId].items.push(it);
  });
  let out = `FLAGGED QUESTIONS (${items.length}):`;
  Object.keys(byCh).sort((a, b) => parseInt(a) - parseInt(b)).forEach(chId => {
    const group = byCh[chId];
    out += `\n\n── ${group.title} ──`;
    group.items.forEach(it => {
      out += `\n  [${it.key}] ${it.questionId} · ${it.sectionTitle}\n    "${it.question}"`;
    });
  });
  return out;
}

function updateFlaggedFloat() {
  const btn = document.getElementById('flaggedBtn');
  const count = document.getElementById('flaggedCount');
  if (btn && count) {
    count.textContent = state.flagged.size;
    btn.classList.toggle('has-flags', state.flagged.size > 0);
  }
}

function showFlaggedModal() {
  const items = [...state.flagged].map(findPointByKey).filter(Boolean);
  const byCh = {};
  items.forEach(it => {
    if (!byCh[it.chapterId]) byCh[it.chapterId] = { title: it.chapterTitle, items: [] };
    byCh[it.chapterId].items.push(it);
  });

  let content = '';
  if (items.length === 0) {
    content = '<div class="modal-empty">No flagged questions yet. Click the "Flag" button on any question to mark it.</div>';
  } else {
    content = Object.keys(byCh).sort((a, b) => parseInt(a) - parseInt(b)).map(chId => {
      const group = byCh[chId];
      const itemsHtml = group.items.map(it => `
        <div class="modal-item">
          <div class="modal-item-text">
            <div class="modal-item-path">${escapeHtml(it.questionId)} · ${escapeHtml(it.sectionTitle)}</div>
            <div class="modal-item-q">${escapeHtml(it.question)}</div>
          </div>
          <button type="button" class="modal-item-unflag" data-key="${escapeHtml(it.key)}">Unflag</button>
        </div>
      `).join('');
      return `<div class="modal-section-hdr">${escapeHtml(group.title)}</div>${itemsHtml}`;
    }).join('');
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Flagged Questions (${items.length})</div>
      <div class="modal-sub">Click a flag on any question to mark it for later review.</div>
      ${content}
      <div class="modal-actions">
        ${items.length > 0 ? '<button type="button" class="btn btn-secondary" id="modalClearBtn">Clear All</button>' : ''}
        <button type="button" class="btn btn-secondary" id="modalCloseBtn">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#modalCloseBtn')?.addEventListener('click', close);
  overlay.querySelector('#modalClearBtn')?.addEventListener('click', () => {
    if (!confirm('Clear all flags? This cannot be undone.')) return;
    state.flagged.clear();
    saveFlagged();
    updateFlaggedFloat();
    close();
    render();
  });
  overlay.querySelectorAll('.modal-item-unflag').forEach(btn => {
    btn.addEventListener('click', () => {
      state.flagged.delete(btn.dataset.key);
      saveFlagged();
      close();
      updateFlaggedFloat();
      showFlaggedModal();
      render();
    });
  });
}

function getChapterPoints(chapterId) {
  const ch = DATA.chapters.find(c => c.id === chapterId);
  if (!ch || !ch.questions) return [];
  const list = [];
  ch.questions.forEach((q, qIdx) => {
    const pts = flatPoints(q);
    pts.forEach((p, pIdx) => {
      list.push({ point: p, key: `c${chapterId}.q${qIdx}.p${pIdx}`, questionIdx: qIdx, pointIdx: pIdx });
    });
  });
  return list;
}

function computeSummary(chapterId) {
  const pts = getChapterPoints(chapterId);
  let correct = 0, wrong = 0, revealed = 0, skipped = 0;
  const wrongKeys = [];
  pts.forEach(({ key, questionIdx, pointIdx }) => {
    const ans = state.answers[key];
    if (!ans) skipped++;
    else if (ans.revealed) revealed++;
    else if (ans.correct) correct++;
    else { wrong++; wrongKeys.push({ questionIdx, pointIdx, key }); }
  });
  return { total: pts.length, correct, wrong, revealed, skipped, wrongKeys };
}

function flatPoints(question) {
  const pts = [];
  question.sections.forEach((s, si) => {
    s.points.forEach((p, pi) => {
      pts.push({ ...p, _sectionTitle: s.title, _si: si, _pi: pi });
    });
  });
  return pts;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTabs() {
  const el = document.getElementById('chapterTabs');
  el.innerHTML = DATA.chapters.map(c => {
    let cls = 'chapter-tab';
    if (!c.available) cls += ' disabled';
    else if (c.id === state.chapterId) cls += ' active';
    return `<div class="${cls}" data-id="${c.id}">${escapeHtml(c.title)}</div>`;
  }).join('');

  el.querySelectorAll('.chapter-tab:not(.disabled)').forEach(tab => {
    tab.addEventListener('click', () => {
      state.chapterId = parseInt(tab.dataset.id, 10);
      state.questionIdx = 0;
      state.pointIdx = 0;
      state.view = 'practice';
      state.retryMode = false;
      state.retryList = [];
      state.retryIdx = 0;
      render();
    });
  });
}

function render() {
  renderTabs();
  const ch = DATA.chapters.find(c => c.id === state.chapterId);
  const content = document.getElementById('content');

  if (!ch.available || !ch.questions || ch.questions.length === 0) {
    content.innerHTML = '<div class="placeholder">Coming soon — this chapter is still being built.</div>';
    return;
  }

  if (state.view === 'summary') {
    content.innerHTML = renderSummary(state.chapterId);
    attachSummaryListeners();
    return;
  }

  if (state.retryMode) {
    if (state.retryIdx >= state.retryList.length) {
      state.retryMode = false;
      state.view = 'summary';
      return render();
    }
    const cur = state.retryList[state.retryIdx];
    state.questionIdx = cur.questionIdx;
    state.pointIdx = cur.pointIdx;
  }

  const qIdx = state.questionIdx;
  const q = ch.questions[qIdx];
  const points = flatPoints(q);
  if (state.pointIdx >= points.length) state.pointIdx = 0;
  const cp = points[state.pointIdx];
  const key = `c${state.chapterId}.q${qIdx}.p${state.pointIdx}`;

  const totalAnswered = Object.values(state.answers).filter(a => !a.revealed).length;

  const qSelectorHtml = (!state.retryMode && ch.questions.length > 1)
    ? `<div class="question-selector">${ch.questions.map((qq, i) =>
        `<div class="qbtn ${i === qIdx ? 'active' : ''}" data-idx="${i}">${escapeHtml(qq.id)}</div>`).join('')}</div>`
    : '';

  const retryBanner = state.retryMode
    ? `<div class="retry-banner">
        <div>Retry mode &middot; <strong>${state.retryIdx + 1}</strong> of <strong>${state.retryList.length}</strong> previously-wrong questions</div>
        <button class="btn btn-secondary" id="exitRetryBtn" style="padding:6px 12px;font-size:12px;">Exit Retry</button>
      </div>`
    : '';

  let canPrev, nextLabel;
  if (state.retryMode) {
    canPrev = state.retryIdx > 0;
    nextLabel = state.retryIdx === state.retryList.length - 1 ? 'Finish Retry' : 'Next &rarr;';
  } else {
    canPrev = state.pointIdx > 0 || qIdx > 0;
    const isLastPoint = state.pointIdx >= points.length - 1;
    const isLastQ = qIdx >= ch.questions.length - 1;
    nextLabel = (isLastPoint && isLastQ) ? 'Finish Chapter' : 'Next &rarr;';
  }

  const progressLabel = state.retryMode
    ? `Retry point ${state.retryIdx + 1} of ${state.retryList.length}`
    : `${q.id} &middot; Point ${state.pointIdx + 1} of ${points.length}`;
  const progressPct = state.retryMode
    ? Math.round(((state.retryIdx + 1) / state.retryList.length) * 100)
    : Math.round(((state.pointIdx + 1) / points.length) * 100);

  content.innerHTML = `
    ${qSelectorHtml}
    ${retryBanner}
    <div class="question-header">
      <div class="q-title">${escapeHtml(q.id)} <span class="q-marks">${escapeHtml(q.marks)}</span>${q.probability ? `<span class="q-prob ${q.probability}">${q.probability} &middot; ${q.appearances}&times;</span>` : ''}</div>
      <div class="q-prompt">${escapeHtml(q.prompt)}</div>
      ${q.years ? `<div class="q-years"><strong>Past exam years (BS):</strong> ${escapeHtml(q.years)}</div>` : ''}
    </div>
    <div class="progress-text">
      <div>${progressLabel}</div>
      <div>${escapeHtml(cp._sectionTitle)}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    ${renderMCQ(cp, key)}
    <div class="controls">
      <button class="btn btn-secondary" id="prevBtn" ${canPrev ? '' : 'disabled'}>&larr; Previous</button>
      <div class="score-badge" id="scoreBadge" title="Click for chapter summary" style="cursor:pointer;">Score: <strong>${state.correctCount}</strong> / ${totalAnswered} &middot; View Summary</div>
      <button class="btn btn-primary" id="nextBtn">${nextLabel}</button>
    </div>
  `;

  if (qSelectorHtml) {
    content.querySelectorAll('.qbtn').forEach(b => {
      b.addEventListener('click', () => {
        state.questionIdx = parseInt(b.dataset.idx, 10);
        state.pointIdx = 0;
        render();
      });
    });
  }

  attachMCQListeners(cp, key);

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (!canPrev) return;
    if (state.retryMode) {
      state.retryIdx--;
    } else if (state.pointIdx > 0) {
      state.pointIdx--;
    } else if (qIdx > 0) {
      state.questionIdx--;
      const prevQ = ch.questions[state.questionIdx];
      state.pointIdx = flatPoints(prevQ).length - 1;
    }
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (state.retryMode) {
      if (state.retryIdx < state.retryList.length - 1) {
        state.retryIdx++;
      } else {
        state.retryMode = false;
        state.view = 'summary';
      }
    } else {
      const curPoints = flatPoints(ch.questions[state.questionIdx]);
      if (state.pointIdx < curPoints.length - 1) {
        state.pointIdx++;
      } else if (state.questionIdx < ch.questions.length - 1) {
        state.questionIdx++;
        state.pointIdx = 0;
      } else {
        state.view = 'summary';
      }
    }
    render();
  });

  document.getElementById('scoreBadge').addEventListener('click', () => {
    state.view = 'summary';
    render();
  });

  const exitBtn = document.getElementById('exitRetryBtn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      state.retryMode = false;
      state.view = 'summary';
      render();
    });
  }
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  if (!canvas) return;
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f56565', '#ed8936', '#ecc94b', '#48bb78', '#4299e1', '#9f7aea', '#ed64a6'];
  const particles = [];
  const count = 180;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height * 0.5,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 3 + 2,
      size: Math.random() * 9 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 12,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  const start = Date.now();
  const duration = 4500;
  function tick() {
    const elapsed = Date.now() - start;
    const progress = elapsed / duration;
    if (progress >= 1) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = progress > 0.75 ? 1 - (progress - 0.75) / 0.25 : 1;
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.rotation += p.rotationSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    });
    requestAnimationFrame(tick);
  }
  tick();
}

function renderSummary(chapterId) {
  const ch = DATA.chapters.find(c => c.id === chapterId);
  const s = computeSummary(chapterId);
  const pct = n => s.total > 0 ? Math.round((n / s.total) * 100) : 0;

  const barSegs = [
    { count: s.correct, color: '#48bb78' },
    { count: s.wrong, color: '#f56565' },
    { count: s.revealed, color: '#4299e1' },
    { count: s.skipped, color: '#ed8936' }
  ].filter(seg => seg.count > 0)
   .map(seg => `<div class="summary-bar-seg" style="width:${(seg.count/s.total)*100}%;background:${seg.color};"></div>`)
   .join('');

  const retryBtn = s.wrong > 0
    ? `<button class="btn btn-primary" id="retryWrongBtn">Retry ${s.wrong} Wrong Question${s.wrong === 1 ? '' : 's'}</button>`
    : '';

  return `
    <div class="summary-wrap">
      <div class="deepak-applause">
        <span class="applause-emoji">👏</span>
        Deepak applauds you
        <span class="applause-emoji">👏</span>
      </div>
      <div class="summary-title">${escapeHtml(ch.title)} — Summary</div>
      <div class="summary-sub">${s.total} total question${s.total === 1 ? '' : 's'} in this chapter</div>
      <div class="summary-bar">${barSegs || '<div class="summary-bar-seg" style="width:100%;background:#e2e8f0;"></div>'}</div>
      <div class="summary-grid">
        <div class="summary-cell correct">
          <div class="summary-num">${s.correct}</div>
          <div class="summary-label">Correct</div>
          <div class="summary-pct">${pct(s.correct)}%</div>
        </div>
        <div class="summary-cell wrong">
          <div class="summary-num">${s.wrong}</div>
          <div class="summary-label">Wrong</div>
          <div class="summary-pct">${pct(s.wrong)}%</div>
        </div>
        <div class="summary-cell revealed">
          <div class="summary-num">${s.revealed}</div>
          <div class="summary-label">Revealed</div>
          <div class="summary-pct">${pct(s.revealed)}%</div>
        </div>
        <div class="summary-cell skipped">
          <div class="summary-num">${s.skipped}</div>
          <div class="summary-label">Skipped</div>
          <div class="summary-pct">${pct(s.skipped)}%</div>
        </div>
      </div>
      <div class="summary-actions">
        ${retryBtn}
        <button class="btn btn-secondary" id="backToPracticeBtn">Back to Practice</button>
      </div>
      <div style="text-align:center;margin-top:22px;padding:16px;background:linear-gradient(135deg,#fef5fb 0%,#ebf4ff 100%);border:1px dashed #d6bcfa;border-radius:10px;">
        <div style="font-size:13px;color:#744210;margin-bottom:8px;">You finished the chapter! Crush that exam tomorrow:</div>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:10px 22px;background:#4c51bf;color:white;font-weight:600;text-decoration:none;border-radius:8px;font-size:14px;box-shadow:0 2px 6px rgba(76,81,191,0.3);">Click for Reward</a>
      </div>
    </div>
  `;
}

function attachSummaryListeners() {
  launchConfetti();
  const retryBtn = document.getElementById('retryWrongBtn');
  if (retryBtn) {
    retryBtn.addEventListener('click', () => {
      const s = computeSummary(state.chapterId);
      if (s.wrongKeys.length === 0) return;
      s.wrongKeys.forEach(({ key }) => { delete state.answers[key]; });
      state.retryMode = true;
      state.retryList = s.wrongKeys.map(({ questionIdx, pointIdx }) => ({ questionIdx, pointIdx }));
      state.retryIdx = 0;
      state.view = 'practice';
      render();
    });
  }
  const backBtn = document.getElementById('backToPracticeBtn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      state.view = 'practice';
      state.questionIdx = 0;
      state.pointIdx = 0;
      render();
    });
  }
}

function renderMCQ(point, key) {
  const userAns = state.answers[key];
  const answered = userAns !== undefined;

  const opts = point.options.map((o, i) => {
    let cls = 'mcq-option';
    if (answered) {
      cls += ' disabled';
      if (i === point.a) cls += ' correct';
      else if (!userAns.revealed && i === userAns.selected) cls += ' incorrect';
    }
    return `<div class="${cls}" data-idx="${i}">${escapeHtml(o)}</div>`;
  }).join('');

  let fb = '';
  let revealBtn = '';
  if (answered) {
    if (userAns.revealed) {
      fb = `<div class="feedback revealed show">Answer revealed — the correct option is highlighted. This attempt isn't counted in your score.</div>`;
    } else if (userAns.correct) {
      fb = `<div class="feedback correct show">Correct.</div>`;
    } else {
      fb = `<div class="feedback incorrect show">Not quite — the correct answer is highlighted in green.</div>`;
    }
  } else {
    revealBtn = `<div class="reveal-row"><button class="btn btn-secondary" id="revealBtn">Show Answer</button><span style="font-size:11.5px;color:#a0aec0;">Doesn't count toward score</span></div>`;
  }

  const flagged = state.flagged.has(key);
  const flagBtnHtml = `<button type="button" class="flag-btn ${flagged ? 'flagged' : ''}" data-flag-key="${escapeHtml(key)}">${flagged ? 'Flagged' : 'Flag'}</button>`;
  const retryBtnHtml = state.answers[key] ? `<button type="button" class="retry-q-btn" data-retry-key="${escapeHtml(key)}" title="Retry this question">Retry</button>` : '';

  return `
    <div class="mcq-card">
      ${retryBtnHtml}
      ${flagBtnHtml}
      <span class="section-badge">${escapeHtml(point._sectionTitle)}</span>
      <div class="mcq-question">${escapeHtml(point.q)}</div>
      <div class="mcq-options">${opts}</div>
      ${revealBtn}
      ${fb}
    </div>
  `;
}

function attachMCQListeners(point, key) {
  attachFlagListener();
  if (state.answers[key]) return;
  document.querySelectorAll('.mcq-option:not(.disabled)').forEach(opt => {
    opt.addEventListener('click', () => {
      const idx = parseInt(opt.dataset.idx, 10);
      const correct = idx === point.a;
      state.answers[key] = { selected: idx, correct };
      if (correct) state.correctCount++;
      render();
    });
  });
  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) {
    revealBtn.addEventListener('click', () => {
      state.answers[key] = { selected: point.a, correct: null, revealed: true };
      render();
    });
  }
}

function attachFlagListener() {
  const flagBtn = document.querySelector('.flag-btn');
  if (flagBtn) {
    flagBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFlag(flagBtn.dataset.flagKey);
      render();
    });
  }
  const retryBtn = document.querySelector('.retry-q-btn');
  if (retryBtn) {
    retryBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      retryQuestion(retryBtn.dataset.retryKey);
    });
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadFlagged();
  updateFlaggedFloat();
  const flagBtn = document.getElementById('flaggedBtn');
  if (flagBtn) flagBtn.addEventListener('click', showFlaggedModal);
  render();
});
</script>
