// ---------- State ----------
const state = {
  chapterId: 1,
  questionIdx: 0,
  pointIdx: 0,
  view: 'practice',      // 'practice' or 'summary'
  retryMode: false,
  retryList: [],         // array of { questionIdx, pointIdx }
  retryIdx: 0,
  answers: {},           // key "c.q.p" -> { selected, correct } or { seq, correct }
  seqShuffled: {},       // key -> shuffled bank array
  seqSlots: {},          // key -> array of items placed in order (click-to-select)
  correctCount: 0,
  compInputs: {},        // key -> array of current input values for components questions
  flagged: new Set()     // set of keys flagged as unnecessary
};

function loadFlagged() {
  try {
    const saved = JSON.parse(localStorage.getItem('ii_flagged') || '[]');
    state.flagged = new Set(saved);
  } catch (_) { state.flagged = new Set(); }
}
function saveFlagged() {
  try { localStorage.setItem('ii_flagged', JSON.stringify([...state.flagged])); } catch (_) {}
}
function toggleFlag(key) {
  if (state.flagged.has(key)) state.flagged.delete(key);
  else state.flagged.add(key);
  saveFlagged();
  updateFlaggedFloat();
}

function retryQuestion(key) {
  const ans = state.answers[key];
  if (ans && ans.correct === true) state.correctCount--;
  delete state.answers[key];
  delete state.seqSlots[key];
  delete state.seqShuffled[key];
  delete state.compInputs[key];
  render();
}

function findPointByKey(key) {
  const m = key.match(/^c(\d+)\.q(\d+)\.p(\d+)$/);
  if (!m) return null;
  const chId = parseInt(m[1], 10);
  const qIdx = parseInt(m[2], 10);
  const pIdx = parseInt(m[3], 10);
  const chapter = DATA.chapters.find(c => c.id === chId);
  if (!chapter || !chapter.questions) return null;
  const question = chapter.questions[qIdx];
  if (!question) return null;
  const pts = flatPoints(question);
  const pt = pts[pIdx];
  if (!pt) return null;
  return {
    chapterId: chId,
    chapterTitle: chapter.title,
    questionId: question.id,
    sectionTitle: pt._sectionTitle,
    question: pt.q,
    key
  };
}

function buildFlaggedCopyText() {
  const items = [...state.flagged].map(findPointByKey).filter(Boolean);
  if (items.length === 0) return '(no flagged questions)';
  const byCh = {};
  items.forEach(it => {
    if (!byCh[it.chapterId]) byCh[it.chapterId] = { title: it.chapterTitle, items: [] };
    byCh[it.chapterId].items.push(it);
  });
  let out = `FLAGGED QUESTIONS (${items.length}):`;
  Object.keys(byCh).sort((a, b) => parseInt(a) - parseInt(b)).forEach(chId => {
    const group = byCh[chId];
    out += `\n\n── ${group.title} ──`;
    group.items.forEach(it => {
      out += `\n  [${it.key}] ${it.questionId} · ${it.sectionTitle}\n    "${it.question}"`;
    });
  });
  return out;
}

function updateFlaggedFloat() {
  const btn = document.getElementById('flaggedBtn');
  const count = document.getElementById('flaggedCount');
  if (btn && count) {
    count.textContent = state.flagged.size;
    btn.classList.toggle('has-flags', state.flagged.size > 0);
  }
}

function showFlaggedModal() {
  const items = [...state.flagged].map(findPointByKey).filter(Boolean);
  const byCh = {};
  items.forEach(it => {
    if (!byCh[it.chapterId]) byCh[it.chapterId] = { title: it.chapterTitle, items: [] };
    byCh[it.chapterId].items.push(it);
  });

  let content = '';
  if (items.length === 0) {
    content = '<div class="modal-empty">No flagged questions yet. Click the "Flag" button on any question to mark it for removal.</div>';
  } else {
    content = Object.keys(byCh).sort((a, b) => parseInt(a) - parseInt(b)).map(chId => {
      const group = byCh[chId];
      const itemsHtml = group.items.map(it => `
        <div class="modal-item">
          <div class="modal-item-text">
            <div class="modal-item-path">${escapeHtml(it.questionId)} · ${escapeHtml(it.sectionTitle)}</div>
            <div class="modal-item-q">${escapeHtml(it.question)}</div>
          </div>
          <button type="button" class="modal-item-unflag" data-key="${escapeHtml(it.key)}">Unflag</button>
        </div>
      `).join('');
      return `<div class="modal-section-hdr">${escapeHtml(group.title)}</div>${itemsHtml}`;
    }).join('');
  }

  const copyText = buildFlaggedCopyText();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Flagged Questions (${items.length})</div>
      <div class="modal-sub">Click "Copy for chat" to copy a list you can paste to the assistant.</div>
      ${content}
      ${items.length > 0 ? `<div class="modal-copy-area" id="modalCopyArea">${escapeHtml(copyText)}</div>` : ''}
      <div class="modal-actions">
        ${items.length > 0 ? '<button type="button" class="btn btn-primary" id="modalCopyBtn">Copy for chat</button>' : ''}
        ${items.length > 0 ? '<button type="button" class="btn btn-secondary" id="modalClearBtn">Clear All</button>' : ''}
        <button type="button" class="btn btn-secondary" id="modalCloseBtn">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#modalCloseBtn')?.addEventListener('click', close);
  overlay.querySelector('#modalCopyBtn')?.addEventListener('click', () => {
    const txt = buildFlaggedCopyText();
    const done = () => {
      const btn = overlay.querySelector('#modalCopyBtn');
      if (!btn) return;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy for chat'; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done, () => alert('Copy failed — manually select and copy from the black area.'));
    } else {
      alert('Clipboard not available — manually select and copy from the black area.');
    }
  });
  overlay.querySelector('#modalClearBtn')?.addEventListener('click', () => {
    if (!confirm('Clear all flags? This cannot be undone.')) return;
    state.flagged.clear();
    saveFlagged();
    updateFlaggedFloat();
    close();
    render();
  });
  overlay.querySelectorAll('.modal-item-unflag').forEach(btn => {
    btn.addEventListener('click', () => {
      state.flagged.delete(btn.dataset.key);
      saveFlagged();
      close();
      updateFlaggedFloat();
      showFlaggedModal();
      render();
    });
  });
}

function getChapterPoints(chapterId) {
  const ch = DATA.chapters.find(c => c.id === chapterId);
  if (!ch || !ch.questions) return [];
  const list = [];
  ch.questions.forEach((q, qIdx) => {
    const pts = flatPoints(q);
    pts.forEach((p, pIdx) => {
      list.push({
        point: p,
        key: `c${chapterId}.q${qIdx}.p${pIdx}`,
        questionIdx: qIdx,
        pointIdx: pIdx
      });
    });
  });
  return list;
}

function computeSummary(chapterId) {
  const pts = getChapterPoints(chapterId);
  let correct = 0, wrong = 0, revealed = 0, skipped = 0;
  const wrongKeys = [];
  pts.forEach(({ key, questionIdx, pointIdx }) => {
    const ans = state.answers[key];
    if (!ans) skipped++;
    else if (ans.revealed) revealed++;
    else if (ans.correct) correct++;
    else { wrong++; wrongKeys.push({ questionIdx, pointIdx, key }); }
  });
  return { total: pts.length, correct, wrong, revealed, skipped, wrongKeys };
}

// ---------- Helpers ----------
function flatPoints(question) {
  const pts = [];
  question.sections.forEach((s, si) => {
    s.points.forEach((p, pi) => {
      pts.push({ ...p, _sectionTitle: s.title, _si: si, _pi: pi });
    });
  });
  return pts;
}

function answerKey() {
  return `c${state.chapterId}.q${state.questionIdx}.p${state.pointIdx}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Render ----------
function renderTabs() {
  const el = document.getElementById('chapterTabs');
  el.innerHTML = DATA.chapters.map(c => {
    let cls = 'chapter-tab';
    if (!c.available) cls += ' disabled';
    else if (c.id === state.chapterId) cls += ' active';
    return `<div class="${cls}" data-id="${c.id}">${escapeHtml(c.title)}</div>`;
  }).join('');

  el.querySelectorAll('.chapter-tab:not(.disabled)').forEach(tab => {
    tab.addEventListener('click', () => {
      state.chapterId = parseInt(tab.dataset.id, 10);
      state.questionIdx = 0;
      state.pointIdx = 0;
      state.view = 'practice';
      state.retryMode = false;
      state.retryList = [];
      state.retryIdx = 0;
      render();
    });
  });
}

function render() {
  renderTabs();
  const ch = DATA.chapters.find(c => c.id === state.chapterId);
  const content = document.getElementById('content');

  if (!ch.available || !ch.questions || ch.questions.length === 0) {
    content.innerHTML = '<div class="placeholder">Coming soon — this chapter is still being built.</div>';
    return;
  }

  if (state.view === 'summary') {
    content.innerHTML = renderSummary(state.chapterId);
    attachSummaryListeners();
    return;
  }

  // Determine effective qIdx/pIdx (retry mode overrides)
  if (state.retryMode) {
    if (state.retryIdx >= state.retryList.length) {
      state.retryMode = false;
      state.view = 'summary';
      return render();
    }
    const cur = state.retryList[state.retryIdx];
    state.questionIdx = cur.questionIdx;
    state.pointIdx = cur.pointIdx;
  }

  const qIdx = state.questionIdx;
  const pIdx = state.pointIdx;
  const q = ch.questions[qIdx];
  const points = flatPoints(q);
  if (pIdx >= points.length) state.pointIdx = 0;
  const cp = points[state.pointIdx];
  const key = `c${state.chapterId}.q${qIdx}.p${state.pointIdx}`;

  let bodyHtml = '';
  if (cp.type === 'sequence') bodyHtml = renderSequence(cp, key);
  else if (cp.type === 'type') bodyHtml = renderTypeRecall(cp, key);
  else if (cp.type === 'components') bodyHtml = renderComponents(cp, key);
  else bodyHtml = renderMCQ(cp, key);

  const totalAnswered = Object.values(state.answers).filter(a => !a.revealed).length;

  // Question selector (hidden in retry mode)
  const qSelectorHtml = (!state.retryMode && ch.questions.length > 1)
    ? `<div class="question-selector">${ch.questions.map((qq, i) =>
        `<div class="qbtn ${i === qIdx ? 'active' : ''}" data-idx="${i}">${escapeHtml(qq.id)}</div>`).join('')}</div>`
    : '';

  // Retry banner
  const retryBanner = state.retryMode
    ? `<div class="retry-banner">
        <div>Retry mode · <strong>${state.retryIdx + 1}</strong> of <strong>${state.retryList.length}</strong> previously-wrong questions</div>
        <button class="btn btn-secondary" id="exitRetryBtn" style="padding:6px 12px;font-size:12px;">Exit Retry</button>
      </div>`
    : '';

  // Navigation state (supports cross-question and retry modes)
  let canPrev, canNext, nextLabel;
  if (state.retryMode) {
    canPrev = state.retryIdx > 0;
    canNext = true;
    nextLabel = state.retryIdx === state.retryList.length - 1 ? 'Finish Retry' : 'Next &rarr;';
  } else {
    canPrev = state.pointIdx > 0 || qIdx > 0;
    canNext = true;
    const isLastPoint = state.pointIdx >= points.length - 1;
    const isLastQ = qIdx >= ch.questions.length - 1;
    nextLabel = (isLastPoint && isLastQ) ? 'Finish Chapter' : 'Next &rarr;';
  }

  // Progress label
  const progressLabel = state.retryMode
    ? `Retry point ${state.retryIdx + 1} of ${state.retryList.length}`
    : `${q.id} · Point ${state.pointIdx + 1} of ${points.length}`;
  const progressPct = state.retryMode
    ? Math.round(((state.retryIdx + 1) / state.retryList.length) * 100)
    : Math.round(((state.pointIdx + 1) / points.length) * 100);

  content.innerHTML = `
    ${qSelectorHtml}
    ${retryBanner}
    <div class="question-header">
      <div class="q-title">${escapeHtml(q.id)} <span class="q-marks">${escapeHtml(q.marks)}</span>${q.probability ? `<span class="q-prob ${q.probability}">${q.probability} &middot; ${q.appearances}&times;</span>` : ''}</div>
      <div class="q-prompt">${escapeHtml(q.prompt)}</div>
      ${q.years ? `<div class="q-years"><strong>Past exam years (BS):</strong> ${escapeHtml(q.years)}</div>` : ''}
    </div>
    <div class="progress-text">
      <div>${progressLabel}</div>
      <div>${escapeHtml(cp._sectionTitle)}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    ${bodyHtml}
    <div class="controls">
      <button class="btn btn-secondary" id="prevBtn" ${canPrev ? '' : 'disabled'}>&larr; Previous</button>
      <div class="score-badge" id="scoreBadge" title="Click for chapter summary" style="cursor:pointer;">Score: <strong>${state.correctCount}</strong> / ${totalAnswered} · View Summary</div>
      <button class="btn btn-primary" id="nextBtn">${nextLabel}</button>
    </div>
  `;

  // Listeners
  if (qSelectorHtml) {
    content.querySelectorAll('.qbtn').forEach(b => {
      b.addEventListener('click', () => {
        state.questionIdx = parseInt(b.dataset.idx, 10);
        state.pointIdx = 0;
        render();
      });
    });
  }

  if (cp.type === 'sequence') attachSequenceListeners(cp, key);
  else if (cp.type === 'type') attachTypeRecallListeners(cp, key);
  else if (cp.type === 'components') attachComponentsListeners(cp, key);
  else attachMCQListeners(cp, key);

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (!canPrev) return;
    if (state.retryMode) {
      state.retryIdx--;
    } else if (state.pointIdx > 0) {
      state.pointIdx--;
    } else if (qIdx > 0) {
      state.questionIdx--;
      const prevQ = ch.questions[state.questionIdx];
      state.pointIdx = flatPoints(prevQ).length - 1;
    }
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (state.retryMode) {
      if (state.retryIdx < state.retryList.length - 1) {
        state.retryIdx++;
      } else {
        state.retryMode = false;
        state.view = 'summary';
      }
    } else {
      const curPoints = flatPoints(ch.questions[state.questionIdx]);
      if (state.pointIdx < curPoints.length - 1) {
        state.pointIdx++;
      } else if (state.questionIdx < ch.questions.length - 1) {
        state.questionIdx++;
        state.pointIdx = 0;
      } else {
        state.view = 'summary';
      }
    }
    render();
  });

  document.getElementById('scoreBadge').addEventListener('click', () => {
    state.view = 'summary';
    render();
  });

  const exitBtn = document.getElementById('exitRetryBtn');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      state.retryMode = false;
      state.view = 'summary';
      render();
    });
  }
}

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  if (!canvas) return;
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f56565', '#ed8936', '#ecc94b', '#48bb78', '#4299e1', '#9f7aea', '#ed64a6'];
  const particles = [];
  const count = 180;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height * 0.5,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 3 + 2,
      size: Math.random() * 9 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 12,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  const start = Date.now();
  const duration = 4500;
  function tick() {
    const elapsed = Date.now() - start;
    const progress = elapsed / duration;
    if (progress >= 1) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = progress > 0.75 ? 1 - (progress - 0.75) / 0.25 : 1;
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.rotation += p.rotationSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    });
    requestAnimationFrame(tick);
  }
  tick();
}

function attachSummaryListeners() {
  launchConfetti();
  const retryBtn = document.getElementById('retryWrongBtn');
  if (retryBtn) {
    retryBtn.addEventListener('click', () => {
      const s = computeSummary(state.chapterId);
      if (s.wrongKeys.length === 0) return;
      // Clear wrong answers so they can be re-attempted
      s.wrongKeys.forEach(({ key }) => {
        delete state.answers[key];
        delete state.seqSlots[key];
        delete state.seqShuffled[key];
      });
      state.retryMode = true;
      state.retryList = s.wrongKeys.map(({ questionIdx, pointIdx }) => ({ questionIdx, pointIdx }));
      state.retryIdx = 0;
      state.view = 'practice';
      render();
    });
  }
  const backBtn = document.getElementById('backToPracticeBtn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      state.view = 'practice';
      state.questionIdx = 0;
      state.pointIdx = 0;
      render();
    });
  }
}

function normalizeAnswer(s) {
  return String(s || '').toLowerCase().trim().replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ');
}
function checkTypeAnswer(input, accepted) {
  const n = normalizeAnswer(input);
  if (!n) return false;
  return accepted.some(a => normalizeAnswer(a) === n);
}

function renderComponents(point, key) {
  const userAns = state.answers[key];
  const answered = userAns !== undefined;
  const flagged = state.flagged.has(key);
  const flagBtnHtml = `<button type="button" class="flag-btn ${flagged ? 'flagged' : ''}" data-flag-key="${escapeHtml(key)}">${flagged ? 'Flagged' : 'Flag'}</button>`;
  const retryBtnHtml = state.answers[key] ? `<button type="button" class="retry-q-btn" data-retry-key="${escapeHtml(key)}" title="Retry this question">Retry</button>` : '';

  const n = point.items.length;
  if (!state.compInputs[key]) state.compInputs[key] = new Array(n).fill('');
  const inputs = state.compInputs[key];

  let rowsHtml = '';
  point.items.forEach((item, i) => {
    let cls = 'component-row';
    let inner;
    if (answered) {
      if (userAns.revealed) {
        cls += ' revealed';
        inner = `<div class="component-content">
          <div class="component-hint">Hint: ${escapeHtml(item.hint)}</div>
          <div class="component-expected">Answer: ${escapeHtml(item.answers[0])}</div>
        </div>`;
      } else if (userAns.itemsCorrect[i]) {
        cls += ' correct';
        inner = `<div class="component-content">
          <div class="component-hint">Hint: ${escapeHtml(item.hint)}</div>
          <div class="component-given">${escapeHtml(userAns.inputs[i])}</div>
        </div>`;
      } else {
        cls += ' incorrect';
        inner = `<div class="component-content">
          <div class="component-hint">Hint: ${escapeHtml(item.hint)}</div>
          <div class="component-given">Your answer: ${escapeHtml(userAns.inputs[i] || '(empty)')}</div>
          <div class="component-expected">Correct: ${escapeHtml(item.answers[0])}</div>
        </div>`;
      }
    } else {
      inner = `<div class="component-content">
        <div class="component-hint">Hint: ${escapeHtml(item.hint)}</div>
        <input type="text" class="component-input" data-idx="${i}" value="${escapeHtml(inputs[i])}" placeholder="Type component name or acronym..." autocomplete="off" spellcheck="false">
      </div>`;
    }
    rowsHtml += `<div class="${cls}"><span class="component-num">${i+1}</span>${inner}</div>`;
  });

  let fb = '';
  let actions = '';
  if (answered) {
    const correctCount = userAns.itemsCorrect ? userAns.itemsCorrect.filter(x => x).length : 0;
    if (userAns.revealed) {
      fb = `<div class="feedback revealed show">Answer revealed — all ${n} components shown above. This attempt isn't counted in your score.</div>`;
    } else if (userAns.correct) {
      fb = `<div class="feedback correct show">All ${n} correct — great job!</div>`;
    } else {
      fb = `<div class="feedback incorrect show">You got <strong>${correctCount} of ${n}</strong> correct. Review the red rows above.</div>`;
    }
  } else {
    actions = `<div class="reveal-row">
      <button type="button" class="btn btn-primary" id="compSubmit">Submit All</button>
      <button type="button" class="btn btn-secondary" id="revealBtn">Show Answer</button>
      <span style="font-size:11.5px;color:#a0aec0;">Press Enter in any field to submit · Reveal doesn't count</span>
    </div>`;
  }

  return `
    <div class="mcq-card">
      ${retryBtnHtml}
      ${flagBtnHtml}
      <span class="section-badge">${escapeHtml(point._sectionTitle)}</span>
      <div class="mcq-question">${escapeHtml(point.q)}</div>
      <div class="components-grid">${rowsHtml}</div>
      ${actions}
      ${fb}
    </div>
  `;
}

function attachComponentsListeners(point, key) {
  attachFlagListener();
  if (state.answers[key]) return;

  const submitAll = () => {
    const inputs = state.compInputs[key];
    const itemsCorrect = point.items.map((item, i) => checkTypeAnswer(inputs[i], item.answers));
    const allCorrect = itemsCorrect.every(x => x);
    state.answers[key] = { inputs: [...inputs], itemsCorrect, correct: allCorrect };
    if (allCorrect) state.correctCount++;
    render();
  };

  document.querySelectorAll('.component-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.idx, 10);
      state.compInputs[key][idx] = inp.value;
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); submitAll(); }
    });
  });

  setTimeout(() => {
    const first = document.querySelector('.component-input');
    if (first) first.focus();
  }, 0);

  const submit = document.getElementById('compSubmit');
  if (submit) submit.addEventListener('click', submitAll);

  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) {
    revealBtn.addEventListener('click', () => {
      state.answers[key] = {
        inputs: point.items.map(it => it.answers[0]),
        itemsCorrect: point.items.map(() => true),
        correct: null,
        revealed: true
      };
      render();
    });
  }
}

function renderTypeRecall(point, key) {
  const userAns = state.answers[key];
  const answered = userAns !== undefined;
  const flagged = state.flagged.has(key);
  const flagBtnHtml = `<button type="button" class="flag-btn ${flagged ? 'flagged' : ''}" data-flag-key="${escapeHtml(key)}">${flagged ? 'Flagged' : 'Flag'}</button>`;
  const retryBtnHtml = state.answers[key] ? `<button type="button" class="retry-q-btn" data-retry-key="${escapeHtml(key)}" title="Retry this question">Retry</button>` : '';

  const expected = point.answers[0];

  let inputArea = '';
  let fb = '';
  let actions = '';

  if (answered) {
    if (userAns.revealed) {
      inputArea = `<div class="type-answer-display revealed"><div class="type-label">Correct answer</div>${escapeHtml(expected)}</div>`;
      fb = `<div class="feedback revealed show">Answer revealed. This attempt isn't counted in your score.</div>`;
    } else if (userAns.correct) {
      inputArea = `<div class="type-answer-display correct"><div class="type-label">Your answer</div>${escapeHtml(userAns.text)}</div>`;
      fb = `<div class="feedback correct show">Correct.</div>`;
    } else {
      inputArea = `<div class="type-answer-display incorrect"><div class="type-label">Your answer</div>${escapeHtml(userAns.text || '(empty)')}</div>
        <div class="type-answer-display correct" style="margin-top:0;"><div class="type-label">Correct answer</div>${escapeHtml(expected)}</div>`;
      fb = `<div class="feedback incorrect show">Not quite — compare your answer to the correct one above.</div>`;
    }
  } else {
    inputArea = `<input type="text" class="type-input" id="typeInput" placeholder="Type your answer and press Enter..." autocomplete="off" spellcheck="false">`;
    actions = `<div class="reveal-row">
      <button type="button" class="btn btn-primary" id="typeSubmit">Submit</button>
      <button type="button" class="btn btn-secondary" id="revealBtn">Show Answer</button>
      <span style="font-size:11.5px;color:#a0aec0;">Press Enter to submit · Reveal doesn't count</span>
    </div>`;
  }

  return `
    <div class="mcq-card">
      ${retryBtnHtml}
      ${flagBtnHtml}
      <span class="section-badge">${escapeHtml(point._sectionTitle)}</span>
      <div class="mcq-question">${escapeHtml(point.q)}</div>
      ${inputArea}
      ${actions}
      ${fb}
    </div>
  `;
}

function attachTypeRecallListeners(point, key) {
  attachFlagListener();
  if (state.answers[key]) return;

  const input = document.getElementById('typeInput');
  const submit = document.getElementById('typeSubmit');

  const doSubmit = () => {
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    const correct = checkTypeAnswer(text, point.answers);
    state.answers[key] = { text, correct };
    if (correct) state.correctCount++;
    render();
  };

  if (input) {
    setTimeout(() => input.focus(), 0);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); doSubmit(); }
    });
  }
  if (submit) submit.addEventListener('click', doSubmit);

  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) {
    revealBtn.addEventListener('click', () => {
      state.answers[key] = { text: point.answers[0], correct: null, revealed: true };
      render();
    });
  }
}

function renderMCQ(point, key) {
  const userAns = state.answers[key];
  const answered = userAns !== undefined;

  const opts = point.options.map((o, i) => {
    let cls = 'mcq-option';
    if (answered) {
      cls += ' disabled';
      if (i === point.a) cls += ' correct';
      else if (!userAns.revealed && i === userAns.selected) cls += ' incorrect';
    }
    return `<div class="${cls}" data-idx="${i}">${escapeHtml(o)}</div>`;
  }).join('');

  let fb = '';
  let revealBtn = '';
  if (answered) {
    if (userAns.revealed) {
      fb = `<div class="feedback revealed show">Answer revealed — the correct option is highlighted. This attempt isn't counted in your score.</div>`;
    } else if (userAns.correct) {
      fb = `<div class="feedback correct show">Correct.</div>`;
    } else {
      fb = `<div class="feedback incorrect show">Not quite — the correct answer is highlighted in green.</div>`;
    }
  } else {
    revealBtn = `<div class="reveal-row"><button class="btn btn-secondary" id="revealBtn">Show Answer</button><span style="font-size:11.5px;color:#a0aec0;">Doesn't count toward score</span></div>`;
  }

  const flagged = state.flagged.has(key);
  const flagBtnHtml = `<button type="button" class="flag-btn ${flagged ? 'flagged' : ''}" data-flag-key="${escapeHtml(key)}">${flagged ? 'Flagged' : 'Flag'}</button>`;
  const retryBtnHtml = state.answers[key] ? `<button type="button" class="retry-q-btn" data-retry-key="${escapeHtml(key)}" title="Retry this question">Retry</button>` : '';

  return `
    <div class="mcq-card">
      ${retryBtnHtml}
      ${flagBtnHtml}
      <span class="section-badge">${escapeHtml(point._sectionTitle)}</span>
      <div class="mcq-question">${escapeHtml(point.q)}</div>
      <div class="mcq-options">${opts}</div>
      ${revealBtn}
      ${fb}
    </div>
  `;
}

function attachMCQListeners(point, key) {
  attachFlagListener();
  if (state.answers[key]) return;
  document.querySelectorAll('.mcq-option:not(.disabled)').forEach(opt => {
    opt.addEventListener('click', () => {
      const idx = parseInt(opt.dataset.idx, 10);
      const correct = idx === point.a;
      state.answers[key] = { selected: idx, correct };
      if (correct) state.correctCount++;
      render();
    });
  });
  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) {
    revealBtn.addEventListener('click', () => {
      state.answers[key] = { selected: point.a, correct: null, revealed: true };
      render();
    });
  }
}

function attachFlagListener() {
  const flagBtn = document.querySelector('.flag-btn');
  if (flagBtn) {
    flagBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFlag(flagBtn.dataset.flagKey);
      render();
    });
  }
  const retryBtn = document.querySelector('.retry-q-btn');
  if (retryBtn) {
    retryBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      retryQuestion(retryBtn.dataset.retryKey);
    });
  }
}

// ---------- Sequence (drag & drop) ----------
function renderSequence(point, key) {
  const userAns = state.answers[key];
  const answered = userAns !== undefined;

  if (!state.seqShuffled[key]) state.seqShuffled[key] = shuffle(point.sequence);
  if (!state.seqSlots[key]) state.seqSlots[key] = [];

  const selected = state.seqSlots[key];
  const available = state.seqShuffled[key].filter(x => !selected.includes(x));

  const selectedHtml = selected.length > 0
    ? selected.map((item, i) => {
        let cls = 'seq-chip selected';
        if (answered) {
          cls += point.sequence[i] === item ? ' correct-chip' : ' incorrect-chip';
        }
        return `<div class="${cls}" data-item="${escapeHtml(item)}" data-action="deselect">
          <span class="seq-chip-num">${i+1}</span>
          <span class="seq-chip-text">${escapeHtml(item)}</span>
        </div>`;
      }).join('')
    : '<div class="seq-empty-hint">Click items below in the correct order.</div>';

  const availableHtml = available.length > 0
    ? available.map(item =>
        `<div class="seq-chip available" data-item="${escapeHtml(item)}" data-action="select">
          <span class="seq-chip-text">${escapeHtml(item)}</span>
        </div>`
      ).join('')
    : '<div class="seq-empty-hint">All items selected.</div>';

  let fb = '';
  let actions = '';
  if (answered) {
    if (userAns.revealed) {
      fb = `<div class="feedback revealed show">Answer revealed — correct order shown above. This attempt isn't counted in your score.</div>`;
    } else if (userAns.correct) {
      fb = `<div class="feedback correct show">Correct order.</div>`;
    } else {
      const correctOrder = point.sequence.map((item, i) =>
        `<div style="background:white;border:1px solid #9ae6b4;border-radius:6px;padding:8px 12px;margin-top:4px;font-size:13px;display:flex;align-items:center;">
           <span class="seq-chip-num" style="background:#c6f6d5;color:#22543d;">${i+1}</span>${escapeHtml(item)}
         </div>`
      ).join('');
      fb = `<div class="feedback incorrect show">
        Some items are out of order. The correct order is:
        <div style="margin-top:10px;">${correctOrder}</div>
      </div>`;
    }
  } else {
    actions = `<div class="reveal-row">
      <button class="btn btn-secondary" id="revealBtn">Show Answer</button>
      <span style="font-size:11.5px;color:#a0aec0;">Auto-checks when all items are selected · Reveal doesn't count</span>
    </div>`;
  }

  const flagged = state.flagged.has(key);
  const flagBtnHtml = `<button type="button" class="flag-btn ${flagged ? 'flagged' : ''}" data-flag-key="${escapeHtml(key)}">${flagged ? 'Flagged' : 'Flag'}</button>`;
  const retryBtnHtml = state.answers[key] ? `<button type="button" class="retry-q-btn" data-retry-key="${escapeHtml(key)}" title="Retry this question">Retry</button>` : '';

  return `
    <div class="mcq-card">
      ${retryBtnHtml}
      ${flagBtnHtml}
      <span class="section-badge">${escapeHtml(point._sectionTitle)}</span>
      <div class="mcq-question">${escapeHtml(point.q)}</div>
      <div class="seq-label">Your order (click a chip to remove it)</div>
      <div class="seq-selected-area">${selectedHtml}</div>
      <div class="seq-label">Available items (click in correct order)</div>
      <div class="seq-available-area">${availableHtml}</div>
      ${actions}
      ${fb}
    </div>
  `;
}

function attachSequenceListeners(point, key) {
  attachFlagListener();
  document.querySelectorAll('.seq-chip[data-action]').forEach(chip => {
    chip.addEventListener('click', () => {
      if (state.answers[key]) return; // locked after auto-check
      const item = chip.dataset.item;
      const action = chip.dataset.action;
      const selected = state.seqSlots[key];

      if (action === 'select') {
        if (!selected.includes(item)) selected.push(item);
      } else {
        const idx = selected.indexOf(item);
        if (idx > -1) selected.splice(idx, 1);
      }

      // Auto-check when all items are selected
      if (!state.answers[key] && selected.length === point.sequence.length) {
        const correct = selected.every((x, i) => x === point.sequence[i]);
        state.answers[key] = { seq: [...selected], correct };
        if (correct) state.correctCount++;
      }

      render();
    });
  });

  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) {
    revealBtn.addEventListener('click', () => {
      state.seqSlots[key] = [...point.sequence];
      state.answers[key] = { seq: [...point.sequence], correct: null, revealed: true };
      render();
    });
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadFlagged();
  updateFlaggedFloat();
  const flagBtn = document.getElementById('flaggedBtn');
  if (flagBtn) flagBtn.addEventListener('click', showFlaggedModal);
  render();
});
</script>
