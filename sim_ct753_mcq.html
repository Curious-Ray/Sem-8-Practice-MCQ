    { q: "What happens to the confidence interval width if you DOUBLE the number of replications (from n to 2n)?",
      opts: ["Width halves","Width reduces by factor of 1/√2 ≈ 0.707 (not by half)","Width stays the same","Width doubles"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> CI half-width h = t × S/√n. Doubling n → √(2n) = √2 × √n → h reduces to h/√2 ≈ 0.707h. To HALVE the CI width, you need to QUADRUPLE n (since h ∝ 1/√n). This is why getting very precise estimates requires exponentially more replications — diminishing returns." },

    { q: "INTELLIGENT INITIALIZATION as a method for eliminating initial bias means:",
      opts: ["Using more replications to dilute the bias","Starting the simulation in a state close to steady state, estimated from queuing theory or a preliminary run","Discarding the first 20% of observations automatically","Using variance reduction techniques"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> Example: M/M/1 queue with ρ=0.8. Steady state L=0.8/0.2=4 customers. Start simulation with 4 customers in system instead of 0. This eliminates most of the transient immediately. More sophisticated: use the entire steady-state distribution to initialize the queue length randomly at startup." }
,
    { q: "Which formula gives the required number of replications n* to achieve confidence interval half-width h?",
      opts: ["n* = t²×S²/h²","n* = ⌈(t_{n₀-1,α/2} × S / h)²⌉ — computed from pilot study of n₀ replications","n* = N/h where N is population size","n* = 1/(h²) regardless of variance"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> From CI formula: h = t×S/√n → √n = t×S/h → n = (t×S/h)². Since t depends on df=n-1 (which depends on n), use initial estimate from pilot n₀: n* = ⌈(t_{n₀-1,α/2}×S/h)²⌉. If n* > n₀, collect additional replications. This sequential procedure converges to the required precision." }
,
    { q: "When should you use INDEPENDENT REPLICATIONS instead of BATCH MEANS for simulation output analysis?",
      opts: ["Always — replications are always better","For TERMINATING simulations (natural endpoint exists) OR when comparing alternative system designs","Only when n > 30","Only for M/M/1 queues"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> Replications excel when: (1) System has a natural end condition (one business day, one shift, one customer lifecycle). (2) Comparing alternative designs (each replication uses same seed across alternatives — paired comparison reduces variance). Batch means excel for: (1) Steady-state analysis of infinite-horizon systems. (2) When warm-up is expensive." },
    { q: "The ENSEMBLE AVERAGE Ȳ(t) in Welch's method is computed as the average across:",
      opts: ["Multiple time periods within one run","Multiple replications at the SAME time point t: Ȳ(t) = (1/n)Σᵢ Yᵢ(t)","Batch means within one long run","Multiple different systems being compared"],
      ans: 1, diff: "hard",
      exp: "<strong>B is correct.</strong> Ensemble average: run n replications. At each time t, average the output across all replications: Ȳ(t) = (Y₁(t)+Y₂(t)+...+Yₙ(t))/n. Plot Ȳ(t) vs t. During transient, Ȳ(t) drifts. In steady state, Ȳ(t) fluctuates around a constant. T_w = point where trend stops. Moving average smoothing applied to Ȳ(t) removes high-frequency noise to reveal the trend." }
  ]
},

{
  id: "ch9", num: "09", title: "Simulation Software",
  desc: "Java single server queue, GPSS blocks, simulation frameworks, SSF, software selection.",
  questions: [
    { q: "In a Java event-driven simulation of a single server queue, the FUTURE EVENT LIST (FEL) is maintained as:",
      opts: ["A sorted array of customers in order of arrival","A priority queue (min-heap) ordered by event time — smallest time at front","A stack (LIFO structure) of events","An unsorted list of all possible future events"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> The FEL must efficiently support: (1) insert a new event, (2) remove the minimum-time event. A min-heap (priority queue) does both in O(log n) time. Linear scan of unsorted list would be O(n) — too slow for large simulations. Java: use PriorityQueue<Event> with comparator on event time." },

    { q: "In the Java single server queue simulation, the variable 'areaServerStatus' is used to compute:",
      opts: ["Average number in queue Lq","Server utilization ρ = areaServerStatus / simTime","Total waiting time of all customers","Number of customers who were rejected"],
      ans: 1, diff: "easy",
      exp: "<strong>B is correct.</strong> areaServerStatus accumulates ∫serverStatus(t)dt — the area under the server-busy curve (0=idle, 1=busy). At end of run: ρ = areaServerStatus/simTime = fraction of time server was busy = utilization. Similarly, areaNumInQ/simTime gives time-average queue length Lq." },

    { q: "In the arrive() function of a single server queue simulation, what happens if the server is BUSY when a customer arrives?",
      opts: ["Customer is rejected and counted as lost","Customer is immediately placed in service (preemptive)","Customer is added to the queue and their arrival time is recorded","Server utilization is incremented by 1"],
      ans: 2, diff: "easy",
      exp: "<strong>C is correct.</strong> If serverStatus==BUSY, the arriving customer joins the queue: numInQueue++ and arrivalTime[numInQueue]=simTime (stored for later computing wait time). The customer waits until the depart() function dequeues them and schedules their service completion (departure event)." },

    { q: "In GPSS, the SEIZE block:",
      opts: ["Creates new transactions (customers)","Captures a named FACILITY — if facility is busy, the transaction waits before this block","Records time spent waiting in queue","Destroys transactions that have completed service"],
      ans: 1, diff: "easy",
      exp: "<strong>B is correct.</strong> SEIZE captures a single-channel resource (FACILITY). If busy, transaction blocks here automatically — GPSS handles the waiting list internally. When the current user RELEASEs, the next waiting transaction automatically SEIZEs. GENERATE creates transactions. TERMINATE destroys them. QUEUE/DEPART measure waiting time." },

    { q: "In GPSS, the difference between SEIZE/RELEASE and ENTER/LEAVE is:",
      opts: ["SEIZE/RELEASE is for queuing, ENTER/LEAVE is for service","SEIZE/RELEASE handles a single-server FACILITY; ENTER/LEAVE handles a multi-unit STORAGE (pool of servers)","SEIZE/RELEASE is for digital simulation, ENTER/LEAVE is for analog","There is no difference — they are synonyms"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> FACILITY = single server (like one barber, one ATM). Use SEIZE/RELEASE. STORAGE = pool of identical servers (like a parking lot with 50 spaces, or a server farm with 10 machines). Use ENTER/LEAVE. STORAGE can hold multiple transactions simultaneously. FACILITY holds exactly one." },

    { q: "The GPSS TRANSFER block with parameter 0.30 routes transactions:",
      opts: ["30% to the first branch, 70% to an alternate branch (probabilistic routing)","All 30% of transactions to the next block","30 transactions per time unit to the next block","Every 30th transaction to an alternate path"],
      ans: 0, diff: "med",
      exp: "<strong>A is correct.</strong> TRANSFER .30,DEST1,DEST2 routes each transaction independently: 30% go to DEST1, 70% go to DEST2 (probabilistic). TRANSFER ALL,DEST routes all to DEST (unconditional). TRANSFER BOTH,DEST tries the next block, goes to DEST if blocked. Probabilistic TRANSFER is how GPSS models routing decisions." },

    { q: "To measure RESPONSE TIME (time from transaction creation to termination) in GPSS, you would use:",
      opts: ["SEIZE and RELEASE blocks","MARK block (records current time) at entry + TABULATE block (computes elapsed time since MARK) at exit","QUEUE and DEPART blocks","ADVANCE block with argument equal to response time"],
      ans: 1, diff: "hard",
      exp: "<strong>B is correct.</strong> MARK P1 stores current time in transaction parameter P1. At the end (before TERMINATE), TABULATE collects (current_time − P1) into a TABLE. QUEUE/DEPART measure waiting time only (time in queue, not including service). MARK+TABULATE measures total sojourn time from any point to another." },

    { q: "In Java simulation, exponential random variates with mean 1/λ are generated using:",
      opts: ["-Math.log(1 - Math.random()) / lambda","-Math.log(Math.random()) / lambda (equivalent, since 1-U is also uniform)","Math.random() / lambda","1 / (lambda * Math.random())"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> Inverse transform: F(x) = 1−e^(−λx) → x = −(1/λ)·ln(U). Since U is U[0,1], so is 1−U, so both −ln(U)/λ and −ln(1−U)/λ are correct. Java: double x = -Math.log(Math.random()) / lambda. This is the standard approach for exponential variates." },

    { q: "The key advantage of DISCRETE-EVENT simulation over TIME-SLICING (fixed time increment) is:",
      opts: ["Discrete-event simulation is always more accurate","Discrete-event simulation jumps directly to event times, skipping idle periods — massively more efficient when events are sparse","Time-slicing is harder to implement in Java","Discrete-event handles continuous systems better"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> Consider a simulation where events happen on average every 100 time units. Time-slicing with Δt=0.01 would execute 10,000 steps per event — 99.99% waste. Discrete-event jumps directly to each event, doing exactly as much work as needed. For sparse-event systems (most queuing simulations), this is orders of magnitude faster." },

    { q: "The 'updateTimeAvgStats' function in Java queue simulation is called:",
      opts: ["Once at the end of the simulation run","After every 100 events","At the BEGINNING of each event processing, before updating state — to accumulate the area for the time period since the last event","Only when the queue changes length"],
      ans: 2, diff: "hard",
      exp: "<strong>C is correct.</strong> Time-average statistics must capture the DURATION spent in each state. Process: (1) time_since_last = new_event_time − last_event_time. (2) areaNumInQ += numInQueue × time_since_last. (3) areaServerStatus += serverStatus × time_since_last. (4) Update lastEventTime. Then process the event and update state. Order matters: accumulate BEFORE changing state." }
,
    { q: "In the Java single server queue, what is the purpose of recording arrival times in an array 'arrivalTimes[]'?",
      opts: ["To sort customers by priority","To compute each customer's individual waiting time: wait = departureTime − arrivalTimes[i]","To calculate the total simulation run time","To verify the Poisson arrival process"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> When customer i is dequeued and begins service at simTime, their waiting time = simTime − arrivalTimes[i]. This is added to totalWait. numWaited++. Average: Wq = totalWait/numWaited. Without recording individual arrival times, you cannot compute per-customer wait times." },
    { q: "GPSS automatically provides statistics for QUEUE blocks. What three standard metrics does GPSS report for each named queue?",
      opts: ["Maximum, minimum, and average server utilization","Maximum queue content, average queue content (time-average), and average waiting time per transaction","Total transactions, rejected transactions, and accepted transactions","Service rate, arrival rate, and utilization"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> For each QUEUE/DEPART pair, GPSS automatically reports: (1) Maximum queue content (peak length). (2) Average queue content (time-average Lq). (3) Average waiting time (Wq per transaction). (4) Zero entries (transactions that didn't wait). (5) Current contents. No coding needed — GPSS collects these automatically." }
,
    { q: "In Java simulation, the 'timeLastEvent' variable is updated AFTER accumulating time-average statistics. What happens if you update it BEFORE accumulating?",
      opts: ["Results are identical — order doesn't matter","Time-average statistics will be WRONG — the interval (lastEvent to currentEvent) will be computed as 0 (since lastEvent was just set to currentEvent)","Simulation runs faster","Random numbers are regenerated"],
      ans: 1, diff: "hard",
      exp: "<strong>B is correct.</strong> Correct sequence: (1) delta_t = currentTime − timeLastEvent. (2) area += currentValue × delta_t. (3) timeLastEvent = currentTime. (4) Update state. If step 3 happens before step 2: timeLastEvent=currentTime → delta_t=0 → area+=0 → ALL time-average statistics become 0. Order of operations matters critically in event-driven simulation." }
  ]
},

{
  id: "ch10", num: "10", title: "Simulation of Computer Systems",
  desc: "Levels of abstraction, CPU simulation, memory simulation, WWW server, performance analysis.",
  questions: [
    { q: "Which level of computer system abstraction is MOST appropriate for evaluating CPU scheduling algorithms (Round Robin vs Priority)?",
      opts: ["Transistor/circuit level","Register Transfer Level (RTL)","Operating System / Process level (queuing model of process scheduling)","Application/job level"],
      ans: 2, diff: "easy",
      exp: "<strong>C is correct.</strong> CPU scheduling operates at the OS/Process level — processes arrive, wait in ready queue, get CPU time quantum, may be preempted, block on I/O, resume. This is modelled as a queuing network: M/M/1 or M/M/c queue for CPU with priority or FCFS discipline. No need for transistor-level detail." },

    { q: "The Register Transfer Level (RTL) simulation is primarily used by:",
      opts: ["OS developers testing scheduling algorithms","Hardware engineers verifying CPU micro-architecture BEFORE committing to silicon fabrication","Application developers testing software performance","Network engineers simulating packet routing"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> RTL simulation verifies that the data path design (how data flows between registers, ALU, memory) is correct at clock-cycle granularity BEFORE manufacturing. A bug found at RTL costs days to fix. The same bug found in silicon costs millions and months. Tools: ModelSim, Synopsys VCS, Verilog/VHDL simulators." },

    { q: "In CPU simulation using a queuing model (Level 4), 'context switching overhead' is modelled as:",
      opts: ["A separate queue between the CPU and ready queue that adds delay","Additional service time added to each process's CPU burst to account for the overhead of saving/restoring register state","A reduction in arrival rate of processes","An increase in the calling population size"],
      ans: 1, diff: "hard",
      exp: "<strong>B is correct.</strong> Context switch overhead = time CPU spends saving current process registers and loading next process registers (not productive work). It's modelled by adding a constant δ to each service time: effective service time = CPU burst + δ. For Round Robin with quantum Q: effective utilization = Q/(Q+2δ) because each quantum incurs 2 context switches (old out, new in)." },

    { q: "Page FAULT rate in memory simulation directly affects:",
      opts: ["CPU clock frequency","Effective memory access time — each page fault requires a slow disk access (~10ms vs ~100ns for RAM)","Server utilization in the web server model","Random number generation speed"],
      ans: 1, diff: "easy",
      exp: "<strong>B is correct.</strong> Effective Access Time (EAT) = hit_time + miss_rate × (page_fault_penalty). With RAM access = 100ns and disk = 10ms = 10,000,000ns: even 1% page fault rate → EAT = 0.99×100 + 0.01×10,000,000 = 99+100,000 = 100,099ns — 1000× slower than no faults. Page fault rate is the dominant factor in virtual memory performance." },

    { q: "The LRU (Least Recently Used) page replacement policy is BETTER than FIFO because:",
      opts: ["It requires less memory overhead","It exploits temporal locality — recently used pages are likely to be used again soon (better approximates optimal)","It is simpler to implement","It always results in fewer page faults than OPT"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> LRU exploits the TEMPORAL LOCALITY principle of real programs — if page X was just accessed, it's likely to be accessed again soon. FIFO ignores recency and may evict a hot page just because it was loaded earliest. OPT is the theoretical minimum (evict page used furthest in future) but requires future knowledge — unimplementable in real systems." },

    { q: "In a WWW server simulation modelled as M/M/c queue (c threads), what happens when all c threads are busy AND the request buffer is full?",
      opts: ["Server automatically adds more threads","New requests are REJECTED — they receive HTTP 503 Service Unavailable","All threads speed up to handle the load","Requests are queued indefinitely"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> When system capacity is finite (queue buffer + service slots = K) and K customers are in system, new arrivals are rejected. The server returns HTTP 503 to the client. This is why real web servers have configurable connection backlog limits (e.g., Apache: MaxRequestWorkers, nginx: worker_connections)." },

    { q: "For a web server handling λ=100 req/sec with 10 threads (c=10) and mean service rate μ=12 req/sec per thread, server utilization ρ is:",
      opts: ["100/12 = 8.33 (unstable)","100/(10×12) = 100/120 = 0.833","100×12 = 1200","12/100 = 0.12"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> For M/M/c: ρ = λ/(c×μ) = 100/(10×12) = 0.833. Server is 83.3% utilized — stable (ρ<1) but getting close to saturation. Adding λ to 120/sec would make ρ=1.0 → system becomes marginally stable with infinite queue. At λ=130/sec → unstable." },

    { q: "Simulation of a pipeline CPU (5-stage: IF/ID/EX/MEM/WB) would be done at which abstraction level?",
      opts: ["Application/Job level","OS/Process level","ISA / Instruction Set level (models pipeline hazards, stalls, forwarding)","Transistor level"],
      ans: 2, diff: "med",
      exp: "<strong>C is correct.</strong> Pipeline simulation (tracking each instruction through IF→ID→EX→MEM→WB stages, detecting hazards, inserting stalls, implementing forwarding) is ISA-level simulation. Tools: gem5, SimpleScalar. This gives CPI, cache miss impact, branch predictor accuracy — valuable for computer architecture research and compiler optimization." },

    { q: "In a web server simulation, caching has the effect of:",
      opts: ["Increasing the arrival rate of requests","Reducing effective service time for cache-hit requests — served from memory (fast) instead of database (slow)","Increasing the number of threads needed","Reducing the calling population"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> With cache hit rate h and service times μ_fast (cache hit) and μ_slow (DB miss): effective service rate μ_eff = h×μ_fast + (1−h)×μ_slow. Example: h=0.80, μ_fast=500/sec, μ_slow=10/sec → μ_eff = 0.8×500 + 0.2×10 = 402/sec (vs 10/sec without cache — 40× improvement)." },

    { q: "The key metric used for CAPACITY PLANNING of a web server (when does it need upgrading?) is:",
      opts: ["Maximum theoretical throughput","The load level (λ) at which mean response time W exceeds the SLA threshold (e.g., 500ms)","The number of lines of code in the server software","CPU clock frequency"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> SLA (Service Level Agreement) defines maximum acceptable response time (e.g., W ≤ 500ms for 95th percentile). Simulate increasing λ until simulated W exceeds SLA → that λ is the maximum sustainable load. Plan capacity to handle expected peak load with headroom (safety margin). This is how cloud providers dimension their infrastructure." }
,
    { q: "The 'miss penalty' in cache simulation refers to:",
      opts: ["The fine charged for a cache design error","The additional time required when data is NOT in cache and must be fetched from the next slower memory level","The percentage of cache misses","The number of cache lines evicted"],
      ans: 1, diff: "easy",
      exp: "<strong>B is correct.</strong> Miss penalty = extra time for a cache miss = time to access next level (L2, L3, or DRAM) minus L1 hit time. If L1 hit = 1 cycle and DRAM access = 200 cycles, miss penalty = 199 cycles. Effective CPI = base_CPI + (miss_rate × miss_penalty). Reducing miss_rate OR miss_penalty improves performance." },
    { q: "In a web server simulation, 'thread pool exhaustion' occurs when:",
      opts: ["Threads run out of memory for computation","All c server threads are busy AND the request queue is full — new requests must be REJECTED","Thread pool size exceeds CPU cores","Service time becomes deterministic"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> Thread pool exhaustion: all c threads busy + buffer at capacity = system at max capacity K. New arrivals rejected (HTTP 503). Distinguish: (1) threads busy but queue has space → requests queue up (waiting, not rejected). (2) Threads busy AND queue full → rejection. System capacity K = c + buffer_size." }
,
    { q: "The CLOCK ALGORITHM for page replacement is an approximation of:",
      opts: ["FIFO","LRU — uses a 'use bit' per page to approximate recency without full LRU overhead","OPT — predicts future accesses","Random replacement"],
      ans: 1, diff: "hard",
      exp: "<strong>B is correct.</strong> The clock algorithm (also called CLOCK or NRU — Not Recently Used): each page has a use bit set to 1 on access. On page fault: scan pages like clock hands. If use bit=1, clear it and move on. If use bit=0, evict this page. Pages recently accessed (bit=1) get a 'second chance.' Implemented in Linux as the Active/Inactive LRU lists. O(1) amortized complexity." },
    { q: "A simulation shows web server response time W is 200ms at λ=500 req/s, 450ms at λ=700 req/s, and 2800ms at λ=900 req/s. This pattern suggests:",
      opts: ["Linear relationship between λ and W","The server is APPROACHING SATURATION around λ=900 req/s — queuing theory predicts W→∞ as ρ→1","Random behaviour with no pattern","The model has a bug"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> This is classic queuing saturation behaviour: W = 1/(μ−λ) for M/M/1. As λ→μ (ρ→1), W→∞. The steep rise near λ=900 indicates the effective service capacity μ·c is around 900-950 req/s. This is the critical insight from simulation: performance is fine until close to saturation, then degrades catastrophically. Capacity planning must maintain ρ ≤ 0.7-0.8." }
,
    { q: "gem5 and SimpleScalar are tools used for which level of computer system simulation?",
      opts: ["Transistor level (SPICE-based)","ISA/Instruction-level — they model fetch-decode-execute pipeline, cache hierarchy, branch prediction at instruction granularity","Application/job level (queuing theory)","OS/process level (scheduler simulation)"],
      ans: 1, diff: "med",
      exp: "<strong>B is correct.</strong> gem5 and SimpleScalar are widely-used computer architecture simulators. They execute programs instruction-by-instruction, modelling the full pipeline (5+ stages), multiple cache levels, branch predictor, memory system, and instruction-level parallelism. Output: IPC (instructions per cycle), CPI, cache miss rates, branch misprediction rates — data used by CPU architects." }
  ]
}
];

// ===================== APP STATE =====================
let totalScore = 0;
let totalAnswered = 0;
const chapterState = {};

function initState() {
  chapters.forEach(ch => {
    chapterState[ch.id] = { answered: 0, correct: 0, total: ch.questions.length };
  });
}

function updateGlobalScore() {
  document.getElementById('global-score').textContent = totalScore;
  document.getElementById('global-total').textContent = totalAnswered;
}

// ===================== RENDER =====================
function renderTabs() {
  const container = document.getElementById('ch-tabs');
  chapters.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-tab' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + ch.id;
    btn.textContent = `Ch${ch.num}: ${ch.title.split(' ')[0]} ${ch.title.split(' ')[1] || ''}`;
    btn.onclick = () => switchChapter(ch.id);
    container.appendChild(btn);
  });
}

function renderChapters() {
  const main = document.getElementById('main-content');
  chapters.forEach((ch, ci) => {
    const sec = document.createElement('div');
    sec.className = 'chapter-section' + (ci === 0 ? ' active' : '');
    sec.id = 'sec-' + ch.id;

    sec.innerHTML = `
      <div class="chapter-header">
        <div class="ch-number">${ch.num}</div>
        <div class="ch-meta">
          <h2>${ch.title}</h2>
          <p>${ch.desc}</p>
        </div>
        <div class="ch-progress">
          <div class="ch-progress-bar"><div class="ch-progress-fill" id="prog-${ch.id}" style="width:0%"></div></div>
          <div class="ch-progress-text" id="prog-text-${ch.id}">0 / ${ch.questions.length}</div>
        </div>
      </div>
      <div class="mcq-grid" id="grid-${ch.id}"></div>
      <div class="nav-actions">
        <button class="btn btn-ghost" onclick="resetChapter('${ch.id}')">Reset chapter</button>
        ${ci < chapters.length - 1 ? `<button class="btn btn-primary" onclick="switchChapter('${chapters[ci+1].id}')">Next chapter →</button>` : `<button class="btn btn-primary" onclick="showFinalScore()">View final score ↗</button>`}
      </div>
    `;
    main.appendChild(sec);

    const grid = sec.querySelector(`#grid-${ch.id}`);
    ch.questions.forEach((q, qi) => {
      grid.appendChild(renderMCQ(ch.id, qi, q));
    });
  });

  // Final score panel
  const final = document.createElement('div');
  final.id = 'final-score';
  final.className = 'final-score';
  final.innerHTML = `
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px">Final Result</div>
    <h2 style="font-family:'Playfair Display',serif;font-size:36px;">All Chapters Complete</h2>
    <span class="final-grade" id="final-pct">—</span>
    <p style="color:var(--muted);margin-bottom:32px;" id="final-msg">Complete all questions to see your result.</p>
    <div id="final-breakdown" style="text-align:left;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;"></div>
    <div style="margin-top:24px"><button class="btn btn-ghost" onclick="resetAll()">Reset everything</button></div>
  `;
  main.appendChild(final);
}

function renderMCQ(chId, qi, q) {
  const card = document.createElement('div');
  card.className = 'mcq-card';
  card.id = `card-${chId}-${qi}`;

  const diffClass = q.diff === 'easy' ? 'd-easy' : q.diff === 'med' ? 'd-med' : 'd-hard';
  const diffLabel = q.diff === 'easy' ? 'Easy' : q.diff === 'med' ? 'Medium' : 'Hard';

  card.innerHTML = `
    <div class="mcq-header">
      <span class="mcq-num">Q${(qi+1).toString().padStart(2,'0')}</span>
      <div class="mcq-q">${q.q}</div>
      <span class="difficulty-tag ${diffClass}">${diffLabel}</span>
    </div>
    <div class="options-list" id="opts-${chId}-${qi}">
      ${q.opts.map((opt,oi) => `
        <button class="option-btn" id="opt-${chId}-${qi}-${oi}"
          onclick="selectOption('${chId}',${qi},${oi})"
          data-opt="${oi}">
          <span class="opt-letter">${'ABCD'[oi]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="exp-${chId}-${qi}">${q.exp}</div>
  `;
  return card;
}

function selectOption(chId, qi, selected) {
  const ch = chapters.find(c => c.id === chId);
  const q = ch.questions[qi];
  const card = document.getElementById(`card-${chId}-${qi}`);

  // Disable all options
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById(`opt-${chId}-${qi}-${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add(selected === q.ans ? 'correct' : 'reveal');
    if (i === selected && selected !== q.ans) btn.classList.add('wrong');
  }

  // Update card border
  const isCorrect = selected === q.ans;
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Show explanation
  document.getElementById(`exp-${chId}-${qi}`).classList.add('visible');

  // Update stats
  chapterState[chId].answered++;
  if (isCorrect) {
    chapterState[chId].correct++;
    totalScore++;
  }
  totalAnswered++;

  // Update progress
  updateChapterProgress(chId);
  updateGlobalScore();
}

function updateChapterProgress(chId) {
  const state = chapterState[chId];
  const pct = Math.round(state.answered / state.total * 100);
  document.getElementById(`prog-${chId}`).style.width = pct + '%';
  document.getElementById(`prog-text-${chId}`).textContent = `${state.answered} / ${state.total} (${state.correct} correct)`;
  if (state.answered === state.total) {
    document.getElementById(`tab-${chId}`).classList.add('done');
  }
}

function switchChapter(chId) {
  document.querySelectorAll('.chapter-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('final-score').classList.remove('visible');
  document.getElementById(`sec-${chId}`).classList.add('active');
  document.getElementById(`tab-${chId}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetChapter(chId) {
  const ch = chapters.find(c => c.id === chId);
  const state = chapterState[chId];
  totalScore -= state.correct;
  totalAnswered -= state.answered;
  state.answered = 0;
  state.correct = 0;

  ch.questions.forEach((q, qi) => {
    const card = document.getElementById(`card-${chId}-${qi}`);
    card.classList.remove('answered-correct','answered-wrong');
    for (let i = 0; i < q.opts.length; i++) {
      const btn = document.getElementById(`opt-${chId}-${qi}-${i}`);
      btn.disabled = false;
      btn.classList.remove('correct','wrong','reveal');
    }
    document.getElementById(`exp-${chId}-${qi}`).classList.remove('visible');
  });
  document.getElementById(`tab-${chId}`).classList.remove('done');
  updateChapterProgress(chId);
  updateGlobalScore();
}

function resetAll() {
  totalScore = 0;
  totalAnswered = 0;
  chapters.forEach(ch => resetChapter(ch.id));
  switchChapter(chapters[0].id);
}

function showFinalScore() {
  document.querySelectorAll('.chapter-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('final-score');
  panel.classList.add('visible');

  const total = chapters.reduce((s, c) => s + c.questions.length, 0);
  const pct = Math.round(totalScore / total * 100);
  document.getElementById('final-pct').textContent = pct + '%';

  let grade, color;
  if (pct >= 80) { grade = 'Exam Ready'; color = 'var(--accent2)'; }
  else if (pct >= 65) { grade = 'Almost There'; color = 'var(--accent)'; }
  else if (pct >= 50) { grade = 'Needs Work'; color = '#e09800'; }
  else { grade = 'Study Harder'; color = 'var(--accent3)'; }

  document.getElementById('final-pct').style.color = color;
  document.getElementById('final-msg').textContent = `${totalScore}/${total} correct (${pct}%) — ${grade}`;

  const breakdown = document.getElementById('final-breakdown');
  breakdown.innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;font-family:\'IBM Plex Mono\',monospace;letter-spacing:0.06em;text-transform:uppercase;">Chapter Breakdown</div>' +
    chapters.map(ch => {
      const s = chapterState[ch.id];
      const p = s.total > 0 ? Math.round(s.correct/s.total*100) : 0;
      const barColor = p >= 80 ? 'var(--accent2)' : p >= 50 ? 'var(--accent)' : 'var(--accent3)';
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${ch.title}</span>
          <span style="font-family:'IBM Plex Mono',monospace;color:${barColor}">${s.correct}/${s.total}</span>
        </div>
        <div style="height:4px;background:var(--border);border-radius:2px">
          <div style="height:100%;width:${p}%;background:${barColor};border-radius:2px;transition:width 0.6s"></div>
        </div>
      </div>`;
    }).join('');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===================== INIT =====================
initState();
renderTabs();
renderChapters();
updateGlobalScore();
</script>
</body>
</html>
