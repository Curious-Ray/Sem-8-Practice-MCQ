<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPP CE752 — MCQ Practice</title>
<meta name="description" content="Multiple Choice Question practice app for EPP CE752 Engineering Professional Practice exam preparation.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f5f2;
  --bg-card: #ffffff;
  --bg-secondary: #edecea;
  --bg-hover: #e4e2df;
  --text: #1a1a2e;
  --text-secondary: #5f6368;
  --text-muted: #9aa0a6;
  --border: #ddd9d3;
  --border-hover: #b5b0a8;
  --accent: #4361ee;
  --accent-light: #eef0ff;
  --success: #0f9d58;
  --success-bg: #e6f4ea;
  --success-border: #34a853;
  --danger: #d93025;
  --danger-bg: #fce8e6;
  --danger-border: #ea4335;
  --info: #1a73e8;
  --info-bg: #e8f0fe;
  --warning: #e65100;
  --warning-bg: #fff3e0;
  --certain: #b71c1c;
  --certain-bg: #ffebee;
  --medium: #004d40;
  --medium-bg: #e0f2f1;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --bg-card: #1e1e1e;
    --bg-secondary: #2a2a2a;
    --bg-hover: #333;
    --text: #e8eaed;
    --text-secondary: #9aa0a6;
    --text-muted: #6e6e73;
    --border: #3a3a3a;
    --border-hover: #555;
    --accent: #8ab4f8;
    --accent-light: #1e2a3a;
    --success: #81c784;
    --success-bg: #1b2e1c;
    --success-border: #4caf50;
    --danger: #ef9a9a;
    --danger-bg: #2e1b1b;
    --danger-border: #e57373;
    --info: #90caf9;
    --info-bg: #1b2a3e;
    --warning: #ffb74d;
    --warning-bg: #2e2010;
    --certain: #ef9a9a;
    --certain-bg: #2e1b1b;
    --medium: #80cbc4;
    --medium-bg: #1b2e2c;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

.app {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.25rem 5rem;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2rem;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 0.25rem;
}
.header p {
  font-size: 0.875rem;
  color: var(--text-secondary);
}

/* Chapter pills */
.chapters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 1rem;
}
.ch-pill {
  font-size: 0.75rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}
.ch-pill:hover:not(.active) {
  border-color: var(--border-hover);
  color: var(--text);
}
.ch-pill.active {
  background: var(--text);
  color: var(--bg-card);
  border-color: var(--text);
}

/* Controls */
.controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.ctrl-btn {
  font-size: 0.75rem;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s ease;
}
.ctrl-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: var(--bg-secondary);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 1.25rem;
}
.stat-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 0.5rem;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.2;
}
.stat-label {
  font-size: 0.625rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}
.stat-num.c-blue { color: var(--info); }
.stat-num.c-green { color: var(--success); }
.stat-num.c-red { color: var(--danger); }

/* Progress */
.progress-bar {
  height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Question card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.75rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
}
.q-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.badge {
  font-size: 0.6875rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  white-space: nowrap;
}
.badge-ch { background: var(--bg-secondary); color: var(--text-secondary); }
.badge-certain { background: var(--certain-bg); color: var(--certain); }
.badge-veryhigh { background: var(--warning-bg); color: var(--warning); }
.badge-high { background: var(--info-bg); color: var(--info); }
.badge-medium { background: var(--medium-bg); color: var(--medium); }
.q-counter {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.years-tag {
  font-size: 0.6875rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
}
.q-text {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.7;
  margin-bottom: 1.5rem;
}

/* MCQ Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.9375rem;
  line-height: 1.6;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s ease;
}
.option-btn:hover:not(.locked) {
  border-color: var(--accent);
  background: var(--accent-light);
}
.option-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: var(--bg-secondary);
  font-size: 0.8125rem;
  font-weight: 700;
  color: var(--text-secondary);
  transition: all 0.15s ease;
  margin-top: 1px;
}
.option-btn:hover:not(.locked) .option-letter {
  background: var(--accent);
  color: #fff;
}
.option-text {
  flex: 1;
  padding-top: 3px;
}

/* Answer states */
.option-btn.correct {
  border-color: var(--success-border);
  background: var(--success-bg);
}
.option-btn.correct .option-letter {
  background: var(--success);
  color: #fff;
}
.option-btn.wrong {
  border-color: var(--danger-border);
  background: var(--danger-bg);
}
.option-btn.wrong .option-letter {
  background: var(--danger);
  color: #fff;
}
.option-btn.dimmed {
  opacity: 0.45;
}
.option-btn.locked {
  cursor: default;
}

/* Explanation box */
.explanation {
  margin-top: 1.25rem;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  animation: slideIn 0.2s ease;
}
.explanation-label {
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.explanation-text {
  font-size: 0.875rem;
  line-height: 1.75;
  color: var(--text);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Navigation */
.nav-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
}
.nav-btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.9375rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s ease;
  box-shadow: var(--shadow);
}
.nav-btn:hover:not(:disabled) {
  background: var(--bg-secondary);
}
.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
  box-shadow: none;
}
.nav-btn.primary {
  background: var(--text);
  color: var(--bg-card);
  border-color: var(--text);
}
.nav-btn.primary:hover:not(:disabled) {
  opacity: 0.85;
}
.nav-label {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  justify-content: center;
  margin-bottom: 1rem;
}
.mode-toggle-inner {
  display: flex;
  background: var(--bg-secondary);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
  border: 1px solid var(--border);
}
.mode-btn {
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 8px 20px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
}
.mode-btn.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow);
}
.mode-btn:hover:not(.active) {
  color: var(--text);
}

/* Study mode answer */
.reveal-btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text);
  font-size: 0.9375rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s ease;
}
.reveal-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-hover);
}
.answer-box {
  margin-top: 1.25rem;
  padding: 1.25rem;
  background: var(--bg-secondary);
  border-left: 3px solid var(--success-border);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  animation: slideIn 0.2s ease;
}
.answer-label {
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--success);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.answer-text {
  font-size: 0.875rem;
  line-height: 1.8;
  color: var(--text);
}
.answer-text strong {
  color: var(--text);
  font-weight: 600;
}
.mark-row {
  display: flex;
  gap: 8px;
  margin-top: 1rem;
  justify-content: flex-end;
}
.mark-btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid;
  transition: all 0.15s ease;
}
.mark-correct {
  background: var(--success-bg);
  color: var(--success);
  border-color: var(--success-border);
}
.mark-wrong {
  background: var(--danger-bg);
  color: var(--danger);
  border-color: var(--danger-border);
}
.mark-btn:hover { filter: brightness(0.92); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-secondary);
  font-size: 0.9375rem;
}

/* Done banner */
.done-banner {
  text-align: center;
  padding: 2.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
}
.done-banner h2 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.done-banner p {
  font-size: 0.9375rem;
  color: var(--text-secondary);
  margin-bottom: 1rem;
}
.done-score {
  font-size: 3rem;
  font-weight: 800;
}
.done-score.good { color: var(--success); }
.done-score.ok { color: var(--warning); }
.done-score.bad { color: var(--danger); }
.done-detail {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 0.5rem;
}

@media (max-width: 480px) {
  .app { padding: 1rem 0.75rem 3rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .card { padding: 1.25rem; }
  .option-btn { padding: 12px 14px; font-size: 0.875rem; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>EPP CE752 — MCQ Practice</h1>
    <p>Quiz Mode: pick the correct answer. Study Mode: reveal and self-mark.</p>
  </div>

  <div class="mode-toggle">
    <div class="mode-toggle-inner">
      <button class="mode-btn active" id="modeQuiz" onclick="setMode('quiz')">Quiz Mode</button>
      <button class="mode-btn" id="modeStudy" onclick="setMode('study')">Study Mode</button>
    </div>
  </div>

  <div class="chapters" id="chapterBtns"></div>

  <div class="controls">
    <button class="ctrl-btn" onclick="shuffleQuestions()">Shuffle</button>
    <button class="ctrl-btn" onclick="resetSession()">Reset Score</button>
    <button class="ctrl-btn" id="wrongOnlyBtn" onclick="toggleWrongOnly()">Review Wrong</button>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="stat-num c-blue" id="sTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-num c-green" id="sCorrect">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-box"><div class="stat-num c-red" id="sWrong">0</div><div class="stat-label">Wrong</div></div>
    <div class="stat-box"><div class="stat-num" id="sScore">--</div><div class="stat-label">Score</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="pgFill" style="width:0%"></div></div>

  <div id="cardArea"></div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Prev</button>
    <span class="nav-label" id="navLabel"></span>
    <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">Next</button>
  </div>
</div>

<script>
// ============================================================
// CHAPTERS
// ============================================================
const CHAPTERS = [
  { id: 'all', label: 'All' },
  { id: 'ch1', label: 'Ch 1: Society' },
  { id: 'ch2', label: 'Ch 2: Ethics' },
  { id: 'ch3', label: 'Ch 3: Practice' },
  { id: 'ch4', label: 'Ch 4: Contract' },
  { id: 'ch5', label: 'Ch 5: Regulatory' },
  { id: 'ch6', label: 'Ch 6: Issues' },
  { id: 'ch7', label: 'Ch 7: Cases' },
];

// ============================================================
// MCQ DATA — 4 options per question, correct = index of answer
// ============================================================
const ALL_QUESTIONS = [

  // ═══════════════════════════════════════════════════════════
  // CH1 — Society & Engineering History
  // ═══════════════════════════════════════════════════════════

  {ch:'ch1', prob:'VERY HIGH', years:'14/19',
   q:'What is the Latin origin of the word "society"?',
   options:['Civitas — meaning citizenship','Socius — meaning companion or associate','Populus — meaning people','Communis — meaning shared by all'],
   correct:1,
   explanation:'The word "society" comes from the Latin "socius" meaning companion or associate. Society is a group of people sharing common territory, rules, government, culture, values, and beliefs, cooperating for mutual survival. Aristotle said: "Man is a social animal."'},

  {ch:'ch1', prob:'VERY HIGH', years:'14/19',
   q:'How many elements of society are commonly identified?',
   options:['7','8','9','10'],
   correct:2,
   explanation:'The 9 elements: (1) Plurality — male/female/young/old. (2) Differences — opinion/gender/interest. (3) Dynamic — constantly changing. (4) Interdependence. (5) Cooperation. (6) Likeness — blood/nationality. (7) Mutual understanding. (8) Social control and stability. (9) Culture — traditions, values.'},

  {ch:'ch1', prob:'VERY HIGH', years:'14/19',
   q:'Which is NOT one of the 5 basic social institutions found in all societies?',
   options:['Family','Technology','Religion','Economy'],
   correct:1,
   explanation:'The 5 basic social institutions are: Family (socialization), Religion (motivation), Economy (production/distribution), Education (transmit skills), and State (protection/laws). Memory aid: FREED. Technology is a force of change, not a social institution.'},

  {ch:'ch1', prob:'VERY HIGH', years:'14/19',
   q:'According to Talcott Parsons, how many fundamental social needs exist?',
   options:['4','5','7','6'],
   correct:3,
   explanation:'Talcott Parsons identified 6 fundamental social needs: (1) Organizing basic goods/services. (2) Protection from threats. (3) Replacement of members lost by death. (4) Transmission of knowledge. (5) Motivation to fulfill responsibilities. (6) Development of conflict-resolution mechanisms. Memory: O-P-R-T-M-D.'},

  {ch:'ch1', prob:'VERY HIGH', years:'12/19',
   q:'Who defined social change as "change in human relationships"?',
   options:['Aristotle','M.P. Jenson','Talcott Parsons','MacIver'],
   correct:3,
   explanation:'MacIver defined social change as "change in human relationships." M.P. Jenson described it as "modification in ways of doing and thinking of people." Social change is the alteration in patterns of culture, social structure, and social behavior over time.'},

  {ch:'ch1', prob:'VERY HIGH', years:'12/19',
   q:'Which is NOT one of the 6 factors that cause social change?',
   options:['Cultural innovation','Technology','Religion','Population'],
   correct:2,
   explanation:'The 6 factors: (1) Cultural innovation. (2) Technology. (3) Geography. (4) Environment. (5) Population. (6) Human actions (ideas, movements, revolutions). Memory: CT-GEPHA. Religion is a social institution, not a primary factor of social change.'},

  {ch:'ch1', prob:'HIGH', years:'9/19',
   q:'Which type of society first developed cities and used money?',
   options:['Industrial society','Horticultural society','Pastoral society','Agricultural society'],
   correct:3,
   explanation:'Agricultural/Agrarian society (~6,000 years ago) first developed cities and used money. The plow was the key technology, enabling permanent settlements. All social institutions — family, religion, economy, politics, education — developed fully in this era.'},

  {ch:'ch1', prob:'HIGH', years:'9/19',
   q:'Which country was the first industrial society?',
   options:['France','United States','England','Germany'],
   correct:2,
   explanation:'England was the first industrial society, about 280 years ago. The Industrial Revolution was characterized by machines replacing animals/human labor, majority moving to urban areas, division of labor in factories, development of trade unions, and science/education becoming central institutions.'},

  {ch:'ch1', prob:'HIGH', years:'9/19',
   q:'What is the correct historical order of the 5 types of societies?',
   options:['Pastoral → Tribal → Agricultural → Horticultural → Industrial','Tribal → Pastoral → Horticultural → Agricultural → Industrial','Tribal → Horticultural → Pastoral → Agricultural → Industrial','Horticultural → Tribal → Pastoral → Industrial → Agricultural'],
   correct:1,
   explanation:'The correct order: (1) Tribal — hunting/gathering. (2) Pastoral — animal domestication. (3) Horticultural — plant cultivation with hoes. (4) Agricultural — plow, cities, money. (5) Industrial — machines, factories.'},

  {ch:'ch1', prob:'MEDIUM', years:'7/19',
   q:'What did Chang Heng invent in 132 AD?',
   options:['Compass','Printing press','Seismoscope','Water clock'],
   correct:2,
   explanation:'Chang Heng, a Chinese philosopher, invented the Seismoscope in 132 AD — the world\'s first earthquake detection device.'},

  {ch:'ch1', prob:'MEDIUM', years:'7/19',
   q:'Simon Stevin (Netherlands, 1548–1620) is credited with discovering:',
   options:['Laws of motion','Principle of buoyancy','Theory of elasticity','Triangle of forces'],
   correct:3,
   explanation:'Simon Stevin discovered the triangle of forces — the fundamental principle for calculating loads in trusses, cranes, bridges, and other structures. This is a cornerstone of structural engineering.'},

  {ch:'ch1', prob:'MEDIUM', years:'7/19',
   q:'Where did the first engineering school appear?',
   options:['England in 1750 AD','Germany in 1850 AD','France in 1800 AD','Italy in 1700 AD'],
   correct:2,
   explanation:'The first engineering school appeared in France in 1800 AD, institutionalizing engineering as a formal profession with structured education.'},

  {ch:'ch1', prob:'MEDIUM', years:'7/19',
   q:'Where did the earliest urban engineering (towns and cities) appear between 3500–3000 BC?',
   options:['Egypt','Sumer/Mesopotamia (modern Iraq)','Indus Valley','China'],
   correct:1,
   explanation:'Towns and cities first appeared in Sumer (Southern Mesopotamia, modern Iraq) between 3500–3000 BC — one of the earliest examples of urban planning and engineering in the world.'},

  {ch:'ch1', prob:'HIGH', years:'10/19',
   q:'Which is a NEGATIVE impact of technology on society?',
   options:['Cheaper prices through mass production','Better healthcare and medical diagnosis','Quick global networking','Job displacement by automation'],
   correct:3,
   explanation:'Negative impacts include: pollution, new forms of danger (nuclear, cyber), social separation, loss of privacy, computer crimes, lifestyle diseases, and job displacement by automation. Positive impacts include cheaper prices, better healthcare, global networking, and specialization.'},

  // ═══════════════════════════════════════════════════════════
  // CH2 — Ethics & Professional Practice
  // ═══════════════════════════════════════════════════════════

  {ch:'ch2', prob:'CERTAIN', years:'19/19',
   q:'How many characteristics define a profession?',

function probBadgeClass(p) {
  const map = { 'CERTAIN': 'badge-certain', 'VERY HIGH': 'badge-veryhigh', 'HIGH': 'badge-high', 'MEDIUM': 'badge-medium' };
  return map[p] || 'badge-medium';
}

function formatText(text) {
  if (!/\(\d+\)/.test(text)) return text;
  // Put each numbered point on its own line
  let result = text.replace(/\s*\((\d+)\)\s*/g, '<br><strong>($1)</strong> ');
  // If text starts with a numbered point, remove leading <br>
  if (result.startsWith('<br>')) result = result.substring(4);
  // Add spacing after "Memory:" hints
  result = result.replace(/Memory:\s*/g, '<br><em>Memory: </em>');
  return result;
}

function setMode(m) {
  mode = m;
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('modeStudy').classList.toggle('active', m === 'study');
  // Reset current card state
  selectedAnswer = null;
  revealed = false;
  renderCard();
}

function revealAnswer() {
  revealed = true;
  renderCard();
}

function markAnswer(isCorrect) {
  const q = questions[idx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (answeredSet.has(origIdx)) {
    if (idx < questions.length - 1) setTimeout(() => navigate(1), 200);
    return;
  }
  answeredSet.add(origIdx);
  if (isCorrect) { correctCount++; wrongSet.delete(origIdx); }
  else { wrongCount++; wrongSet.add(origIdx); }
  renderStats();
  if (idx < questions.length - 1) setTimeout(() => navigate(1), 300);
  else renderCard();
}

// ============================================================
// ACTIONS
// ============================================================
function setChapter(id) {
  activeChapter = id;
  showWrongOnly = false;
  questions = getFiltered();
  idx = 0;
  selectedAnswer = null;
  revealed = false;
  correctCount = 0;
  wrongCount = 0;
  answeredSet = new Set();
  wrongSet = new Set();
  renderAll();
}

function shuffleQuestions() {
  questions = getFiltered().sort(() => Math.random() - 0.5);
  idx = 0;
  selectedAnswer = null;
  renderCard();
  renderNav();
}

function resetSession() {
  correctCount = 0;
  wrongCount = 0;
  answeredSet = new Set();
  wrongSet = new Set();
  showWrongOnly = false;
  questions = getFiltered();
  idx = 0;
  selectedAnswer = null;
  revealed = false;
  renderAll();
}

function toggleWrongOnly() {
  if (wrongCount === 0 && !showWrongOnly) return;
  showWrongOnly = !showWrongOnly;
  questions = getFiltered();
  idx = 0;
  selectedAnswer = null;
  document.getElementById('wrongOnlyBtn').style.background = showWrongOnly ? 'var(--danger-bg)' : '';
  document.getElementById('wrongOnlyBtn').style.color = showWrongOnly ? 'var(--danger)' : '';
  document.getElementById('wrongOnlyBtn').style.borderColor = showWrongOnly ? 'var(--danger-border)' : '';
  renderCard();
  renderNav();
  renderStats();
}

function navigate(dir) {
  idx = Math.max(0, Math.min(questions.length - 1, idx + dir));
  const origIdx = ALL_QUESTIONS.indexOf(questions[idx]);
  selectedAnswer = answeredSet.has(origIdx) ? 'already' : null;
  revealed = false;
  renderCard();
  renderNav();
}

function selectOption(chosenIdx) {
  if (selectedAnswer !== null) return;

  const q = questions[idx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (answeredSet.has(origIdx)) return;

  selectedAnswer = chosenIdx;
  answeredSet.add(origIdx);

  if (chosenIdx === q.correct) {
    correctCount++;
    wrongSet.delete(origIdx);
  } else {
    wrongCount++;
    wrongSet.add(origIdx);
  }

  renderCard();
  renderStats();
}

// ============================================================
// RENDERING
// ============================================================
function renderChapterBtns() {
  document.getElementById('chapterBtns').innerHTML = CHAPTERS.map(c =>
    `<button class="ch-pill${activeChapter === c.id ? ' active' : ''}" onclick="setChapter('${c.id}')">${c.label}</button>`
  ).join('');
}

function renderStats() {
  const done = answeredSet.size;
  const pct = done > 0 ? Math.round(correctCount / done * 100) : null;
  document.getElementById('sTotal').textContent = questions.length;
  document.getElementById('sCorrect').textContent = correctCount;
  document.getElementById('sWrong').textContent = wrongCount;
  document.getElementById('sScore').textContent = pct !== null ? pct + '%' : '--';
}

function renderNav() {
  const pct = questions.length ? Math.round((idx + 1) / questions.length * 100) : 0;
  document.getElementById('pgFill').style.width = pct + '%';
  document.getElementById('navLabel').textContent = questions.length ? `${idx + 1} / ${questions.length}` : '';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx >= questions.length - 1;
}

function renderCard() {
  const area = document.getElementById('cardArea');

  if (!questions.length) {
    area.innerHTML = showWrongOnly
      ? '<div class="empty-state">No wrong answers to review. Well done!</div>'
      : '<div class="empty-state">No questions for this selection.</div>';
    renderNav();
    return;
  }

  const q = questions[idx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const chapterLabel = CHAPTERS.find(c => c.id === q.ch)?.label || q.ch;

  const metaHTML = `
    <div class="q-meta">
      <span class="badge badge-ch">${chapterLabel}</span>
      <span class="badge ${probBadgeClass(q.prob)}">${q.prob}</span>
      <span class="q-counter">#${idx + 1}</span>
    </div>
    <div class="years-tag">Asked in ${q.years} papers</div>
    <div class="q-text">${q.q}</div>`;

  let bodyHTML = '';

  if (mode === 'quiz') {
    // ── Quiz Mode: MCQ options ──
    const isAnswered = selectedAnswer !== null;
    const letters = ['A', 'B', 'C', 'D'];

    const optionsHTML = q.options.map((opt, i) => {
      let classes = 'option-btn';
      if (isAnswered) {
        classes += ' locked';
        if (i === q.correct) classes += ' correct';
        else if (i === selectedAnswer) classes += ' wrong';
        else classes += ' dimmed';
      }
      return `<button class="${classes}" onclick="selectOption(${i})">
        <span class="option-letter">${letters[i]}</span>
        <span class="option-text">${opt}</span>
      </button>`;
    }).join('');

    bodyHTML = `<div class="options">${optionsHTML}</div>`;

    if (isAnswered) {
      bodyHTML += `
        <div class="explanation">
          <div class="explanation-label">Explanation</div>
          <div class="explanation-text">${formatText(q.explanation)}</div>
        </div>`;
    }
  } else {
    // ── Study Mode: reveal answer ──
    if (revealed) {
      bodyHTML = `
        <div class="answer-box">
          <div class="answer-label">Answer</div>
          <div class="answer-text">${formatText(q.explanation)}</div>
        </div>
        <div class="mark-row">
          <button class="mark-btn mark-wrong" onclick="markAnswer(false)">Got it wrong</button>
          <button class="mark-btn mark-correct" onclick="markAnswer(true)">Got it right</button>
        </div>`;
    } else {
      bodyHTML = `<button class="reveal-btn" onclick="revealAnswer()">Show Answer</button>`;
    }
  }

  area.innerHTML = `<div class="card">${metaHTML}${bodyHTML}</div>`;
  renderNav();
}

function renderAll() {
  renderChapterBtns();
  renderStats();
  renderCard();
  renderNav();
}

// Initialize
renderAll();
</script>
</body>
</html>
